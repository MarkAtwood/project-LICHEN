# LICHEN LoRa Bridge - Zephyr config
#
# Common settings for all boards.
# Board-specific settings go in boards/<board>.conf

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y

# SPI is used by supported LoRa board overlays. Boards without a LoRa radio
# leave CONFIG_LORA/CONFIG_LICHEN_LORA_L2 disabled.
CONFIG_SPI=y

# GPIO for LED
CONFIG_GPIO=y

# Random number generator (fallback for EUI-64 if no hwinfo)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Hardware info for stable EUI-64 identity
CONFIG_HWINFO=y

# LICHEN subsystem
CONFIG_LICHEN=y
CONFIG_LICHEN_IPV6=y

# TinyCrypt for SHA-256 (required by lichen_pubkey_to_iid)
CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y
