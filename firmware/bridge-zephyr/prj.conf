# LICHEN LoRa Bridge - Zephyr config
#
# Common settings for all boards.
# Board-specific settings go in boards/<board>.conf

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_MODE_IMMEDIATE=y

# SPI is used by supported LoRa board overlays. Boards without a LoRa radio
# leave CONFIG_LORA/CONFIG_LICHEN_LORA_L2 disabled.
CONFIG_SPI=y

# GPIO for LED
CONFIG_GPIO=y

# Random number generator (fallback for EUI-64 if no hwinfo)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Hardware info for stable EUI-64 identity
CONFIG_HWINFO=y

# LICHEN subsystem
CONFIG_LICHEN=y
CONFIG_LICHEN_IPV6=y

# Full Zephyr networking is required for LoRa RX ingress. The legacy
# standalone LICHEN_LORA_L2 mode is disabled because it dropped inbound frames.
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

# Safety (spec appendix-c-safety)
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# TinyCrypt for SHA-256 (required by lichen_pubkey_to_iid)
CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y
