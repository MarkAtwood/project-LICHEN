# RAK4631 nRF52840 board-specific config
#
# nRF52840 supports native USB CDC-ACM.

# USB CDC-ACM serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Zephyr forces this to LOG_LEVEL_NONE when CDC ACM is the console and UART
# logging is enabled; set it explicitly to avoid a compile-time warning.
CONFIG_USB_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0029
CONFIG_USB_DEVICE_PRODUCT="LICHEN LoRa Bridge"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"

# LoRa radio on RAK4631 core
CONFIG_LORA=y
