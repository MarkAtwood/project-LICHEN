# BLOCKED/RETIRED: Seeed XIAO ESP32-S3 + Wio-SX1262 (project-LICHEN-2u26.10 / project-LICHEN-2u26 / m5m1.8)
# No canonical Zephyr board or composite shield mapping (seeed_xiao_esp32s3
# + custom Wio-SX1262 shield not in tree or upstream; xiao_s3_wio_sx1262 not
# a valid -b target). Classified FAIL in m5m1.8 bridge audit. Use
# heltec_wifi_lora32_v3/esp32s3/procpu proxy. Do not present as supported
# target. Follows tbeam_supreme pattern. Retained for reference only.
#
# ESP32-S3 with native USB CDC for console.

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
