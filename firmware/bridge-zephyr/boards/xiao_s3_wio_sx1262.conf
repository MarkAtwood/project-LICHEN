# RETIRED per project-LICHEN-2u26.10 / project-LICHEN-80ju: Seeed XIAO ESP32-S3 + Wio-SX1262.
# No canonical Zephyr board or composite shield (seeed_xiao_esp32s3 + Wio-SX1262 shield).
# FAIL in m5m1.8 bridge audit. Use Heltec WiFi LoRa 32 V3 ESP32-S3 proxy instead.
# Support removed. See docs/firmware-board-capability-matrix.md and epic 2u26.
# Retained for reference only (USB CDC + SX1262 SPI/GPIO).

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
