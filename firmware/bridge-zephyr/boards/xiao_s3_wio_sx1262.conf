# RETIRED/BLOCKED per project-LICHEN-2u26.10 (m5m1.8 bridge audit, project-LICHEN-p70q/worktree-worker18): Seeed XIAO ESP32-S3 + Wio-SX1262 has no canonical Zephyr board target. xiao_s3_wio_sx1262 invalid -b target. Classified FAIL; support removed. Use heltec_wifi_lora32_v3_esp32s3_procpu proxy. Fragment retained for reference only. See docs/firmware-board-capability-matrix.md.
#
# ESP32-S3 with native USB CDC for console (retained for reference).
#
# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
