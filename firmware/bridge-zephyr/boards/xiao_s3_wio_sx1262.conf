# STALE/RETIRED per project-LICHEN-2u26.10 / project-LICHEN-80ju (m5m1.8 bridge audit): Seeed XIAO ESP32-S3 + Wio-SX1262.
# No canonical Zephyr board or composite shield mapping (seeed_xiao_esp32s3 + Wio-SX1262 shield); xiao_s3_wio_sx1262 not a valid -b target.
# Classified FAIL in m5m1.8 bridge audit. Use heltec_wifi_lora32_v3/esp32s3/procpu proxy instead.
