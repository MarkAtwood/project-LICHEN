# STALE/RETIRED per project-LICHEN-2u26.10: no canonical composite board mapping for Seeed XIAO ESP32-S3 + Wio-SX1262 shield. Fragment retired per 2u26 audit and matrix. Classified FAIL in m5m1.8 bridge audit. Use heltec_wifi_lora32_v3/esp32s3/procpu proxy instead. See docs/firmware-board-capability-matrix.md and closed epic project-LICHEN-2u26.
# Seeed XIAO ESP32S3 + Wio-SX1262 board-specific config (retained for reference).

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
