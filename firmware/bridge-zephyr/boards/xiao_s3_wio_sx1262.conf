# RETIRED per project-LICHEN-2u26: Seeed XIAO ESP32-S3 + Wio-SX1262.
# No canonical Zephyr board or composite shield (seeed_xiao_esp32s3 + Wio-SX1262).
# Classified FAIL in m5m1.8 bridge audit. Proxy targets: heltec_wifi_lora32_v3.
# Support removed; retained for reference only. See docs/firmware-board-capability-matrix.md.

# ESP32-S3 with native USB CDC for console (retained for reference).

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
