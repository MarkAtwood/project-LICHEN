# RETIRED per project-LICHEN-2u26.10: no canonical composite board mapping for
# Seeed XIAO ESP32-S3 + Wio-SX1262 shield. Support claims removed.
# Use heltec_wifi_lora32_v3_esp32s3_procpu as proxy target instead.
# See docs/firmware-board-capability-matrix.md and closed epic 2u26.
#
# ESP32-S3 with native USB CDC for console (retained for reference).

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
