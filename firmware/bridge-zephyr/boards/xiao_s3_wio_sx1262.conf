# RETIRED per project-LICHEN-2u26.10, project-LICHEN-80ju (m5m1.8 bridge audit): Seeed XIAO ESP32-S3 + Wio-SX1262.
# No canonical Zephyr board or composite shield mapping; xiao_s3_wio_sx1262 not a valid -b target.
# FAIL in bridge audit. Use heltec_wifi_lora32_v3_esp32s3_procpu proxy instead.
# Support removed. Fragment retained for reference only. See docs/firmware-board-capability-matrix.md and epic 2u26.
# Follows tbeam_supreme pattern. Original pin map retained in .overlay for reference.

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
