# RETIRED per project-LICHEN-2u26.10: no canonical Zephyr board or composite shield mapping for Seeed XIAO ESP32-S3 + Wio-SX1262.
# Classified FAIL in bridge audit (m5m1.8). Use Heltec WiFi LoRa 32 V3 (ESP32-S3) proxy instead.
# See docs/firmware-board-capability-matrix.md and closed epic project-LICHEN-2u26.
#
# ESP32-S3 with native USB CDC for console (retained for reference).

# USB CDC serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y

# GPIO for SX1262 control pins and LED
CONFIG_GPIO=y
