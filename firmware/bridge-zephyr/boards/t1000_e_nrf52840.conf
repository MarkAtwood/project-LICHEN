# Seeed T1000-E (t1000_e/nrf52840) bridge board fragment
#
# nRF52840 with LR1110. Matches canonical HWMv2 stem.
# USB CDC-ACM console + LR1110 on SPI2.

# USB CDC-ACM serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0029
CONFIG_USB_DEVICE_PRODUCT="LICHEN LoRa Bridge"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"

# SPI for LR1110 (board DTS provides SPI2 + lr1110 node)
CONFIG_LORA=y
CONFIG_LORA_LR1110=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_LR1110=y
CONFIG_SPI=y

# GPIO (provided by board)
CONFIG_GPIO=y
