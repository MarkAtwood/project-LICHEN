# LilyGo T-Echo board-specific config
#
# nRF52840 with native USB CDC-ACM.

# USB CDC-ACM serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0029
CONFIG_USB_DEVICE_PRODUCT="LICHEN LoRa Bridge"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"

# SPI for SX1262
CONFIG_SPI=y
