# STALE bridge fragment: heltec_vision_master_e290 has no canonical Zephyr board target
# (no matching board in Zephyr tree, lichen/boards/, or HWMv2 selector).
# Retired per project-LICHEN-2u26.3 / 2u26 (bridge mapping scoped). Do not use for builds.
# See docs/firmware-board-capability-matrix.md: partner-owned long tail.
# Heltec Vision Master E290 board-specific config
#
# ESP32-S3 with USB-C uses native USB CDC for console.

# USB CDC-ACM serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y
