# Heltec Wireless Tracker V1.1 board-specific config
#
# ESP32-S3 uses UART0 for console via native USB CDC.

# Disable USB CDC (use UART0 console)
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n

# UART console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y
