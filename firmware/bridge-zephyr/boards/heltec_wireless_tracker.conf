#
# STALE bridge fragment: heltec_wireless_tracker has no canonical Zephyr board target
# (no matching board in Zephyr tree, lichen/boards/, or HWMv2 selector).
# Retired per project-LICHEN-2u26.4 / 2u26 (bridge mapping scoped). Do not use for builds.
# See docs/firmware-board-capability-matrix.md: partner-owned long tail.
# Heltec Wireless Tracker V1.1 board-specific config
#
# ESP32-S3 uses UART0 for console (USB CDC disabled per overlay).

# Disable USB CDC (use UART0 console)
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n

# UART console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y
