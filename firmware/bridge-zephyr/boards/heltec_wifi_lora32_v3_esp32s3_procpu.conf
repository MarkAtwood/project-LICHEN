#
# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262 for bridge-zephyr
# WiFi backhaul, UART console on UART1.
# Resolved merge conflict for project-LICHEN-8ith (worktree-worker18): heltec_wifi_lora32_v3_esp32s3_procpu.conf.
CONFIG_LORA=y
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# WiFi Kconfig for ESP32-S3 Heltec V3
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y
CONFIG_ESP_WIFI_STA_DISCONNECTED_PM_ENABLE=y

# UART1 console for non-destructive monitoring
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
