#
# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262 for bridge-zephyr
# WiFi backhaul, UART console on UART1.
CONFIG_LORA=y
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# WiFi Kconfig fix for ESP32-S3 Heltec V3 (espressif driver, not CONFIG_ESP32_WIFI_STA)
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y
CONFIG_ESP_WIFI_STA_DISCONNECTED_PM_ENABLE=y

# Bench: UART1 console for non-destructive serial monitoring (avoids CP2102 reset on UART0, see lora_ipv6_mesh-9ia2)
# CONFIG_UART_INTERRUPT_DRIVEN required for Zephyr shell/uart driver on ESP32 (polling insufficient for interactive use)
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
