# LilyGo T-Beam v1.2 bridge fragment — RETIRED/FAIL (project-LICHEN-2u26.5)
#
# No canonical Zephyr board target exists for `lilygo_tbeam`. The name is not
# a valid west -b selector in Zephyr 3.7 or lichen/boards/. Pin mapping and
# wiring notes are retained for reference only.
#
# Classified FAIL (no canonical board) per project-LICHEN-2u26 and io1k
# audit. Removed from active support claims. T-Beam v1 class is partner-owned
# long tail (see firmware-board-capability-matrix.md).
#
# ESP32 uses UART0 for console (via CP2102/CH340 USB-serial chip)
# rather than native USB CDC like nRF52.

# Disable USB CDC (not applicable to ESP32)
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n

# UART console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y
