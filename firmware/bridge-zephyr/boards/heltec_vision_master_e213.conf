# STALE/RETIRED per project-LICHEN-2u26.2: no canonical Zephyr target. Fragment retired per 2u26 audit.
# Heltec Vision Master E213 board-specific config
#
# ESP32-S3 with USB-C uses native USB CDC for console.

# USB CDC-ACM serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# SPI for SX1262
CONFIG_LORA=y
CONFIG_SPI=y
