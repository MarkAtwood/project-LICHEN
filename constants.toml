# LICHEN Protocol Constants
#
# Canonical cross-language source of truth.
# Python: lichen.constants
# Rust:   include_str!("../../constants.toml") or generated consts.rs
# C:      generated constants.h

[lora]
# Physical layer (SF10 / BW125 / CR4-5)
spreading_factor = 10
bandwidth_hz     = 125_000
coding_rate      = "4/5"
preamble_symbols = 8
sync_word        = 0x34      # Distinct from Meshtastic (0x2B)

[lora.freq_hz]
# Default channel 0 per region (spec §02-physical-link)
us_ca = 903_900_000   # 903.9 MHz, US/CA 915 MHz ISM band
eu    = 868_100_000   # 868.1 MHz, EU 868 MHz band
au_nz = 916_800_000   # 916.8 MHz, AU/NZ 915 MHz ISM band

[ports]
coap       = 5683
coap_dtls  = 5684
mqtt_sn    = 10883

[schc.rule_id]
# SCHC compression rule IDs (RFC 8724); see spec appendix-schc.md
link_local_coap  = 0    # Link-local IPv6 + UDP + CoAP
global_coap      = 1    # Global IPv6 + UDP + CoAP
icmpv6_echo      = 2    # ICMPv6 Echo Request/Reply
rpl_dio          = 3    # RPL DIO over link-local ICMPv6
rpl_dao          = 4    # RPL DAO with DODAGID over link-local ICMPv6
link_local_oscore = 5   # Link-local IPv6 + UDP + OSCORE-protected CoAP
global_oscore    = 6    # Global IPv6 + UDP + OSCORE-protected CoAP
mqtt_sn          = 7    # IPv6 + UDP + MQTT-SN (port 10883)
uncompressed     = 255  # No compression; full headers follow

[l2.payload_dispatch]
# Authenticated link inner-payload namespace. SCHC rule IDs begin after
# dispatch=0x14; routing/control message types begin after dispatch=0x15.
schc    = 0x14
routing = 0x15

[rpl]
# RPL configuration (spec/drafts/draft-lichen-rpl-lora-00.md, RFC 6550)
instance_id          = 0      # Default RPL instance
mode_of_operation    = 1      # Non-Storing (MOP=1)
icmpv6_type          = 155    # ICMPv6 type for RPL control messages
min_hop_rank_increase = 256
max_rank_increase     = 2048
infinite_rank         = 0xFFFF
root_rank             = 256   # Equal to min_hop_rank_increase
default_lifetime_s    = 1800  # 30 minutes
lifetime_unit_s       = 60    # Lifetime field unit

[rpl.trickle]
# Trickle timer parameters (RFC 6206)
imin_ms         = 4000  # 4 seconds (spec Imin=4000 ms)
imax_doublings  = 8     # Imax = 4000 * 2^8 = 1_024_000 ms (~17.07 min); see spec §6.2
k               = 10    # Redundancy constant

[schc.fragment]
# SCHC ACK-on-Error profile params (M=1 N=6 T=0) adapted from RFC 8724 for LICHEN
m = 1
n = 6
t = 0
rcs_bytes = 4
retransmission_timeout_s = 10
max_ack_requests = 3
inactivity_timeout_s = 60
bitmap_msb_first = true

[announce]
# LICHEN Announce message (spec §05-routing)
type_byte = 0x01   # First byte inside dispatch=0x15 routing/control payloads

[senml]
# RFC 8428 SenML profiles (Content-Format 112) for location, telemetry, battery/status.
# Shared across Python, Rust, C. Base name always urn:dev:mac:<EUI64>:
content_format = 112
base_name_prefix = "urn:dev:mac:"

# Location (crowd map §18.2)
location_lat = "lat"
location_lon = "lon"
location_alt = "alt"
location_speed = "speed"
location_heading = "heading"
location_unit_deg = "deg"
location_unit_m = "m"
location_unit_ms = "m/s"

# Battery and status
battery_pct = "pct"
battery_mv = "mv"
battery_charging = "charging"
battery_unit_pct = "%"
battery_unit_mv = "mV"

# Telemetry metrics
telemetry_temp = "temp"
telemetry_humidity = "hum"
telemetry_pressure = "pressure"
telemetry_unit_cel = "Cel"
telemetry_unit_rh = "%RH"
telemetry_unit_pa = "Pa"

[tdma]
guard_ms = 100
slot_ms = 250
