name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv lock --check
          uv sync --locked --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check src tests pyproject.toml

      - name: Tests
        # The full suite runs, including the integration tests (the BARRIER_SYNC
        # deadlock fgk and the half-duplex self-collision euj are both fixed).
        # The per-test timeout is a safety net so any new hang fails instead of
        # stalling the runner (thread method is async-safe).
        run: uv run pytest -q --timeout=120 --timeout-method=thread

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        # prost-build (lichen-meshtastic) shells out to protoc
        run: sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # No --workspace: that would force-build the non-default members
      # (lichen-embassy, lichen-firmware/*), which are no_std cross-compile
      # targets — embassy-executor's cortex-m asm cannot assemble on the x86
      # host runner. The workspace default-members list is the host-buildable
      # set, which is exactly what plain cargo commands build.
      - name: Build
        run: cargo build --features lichen-link/schnorr,lichen-link/std
        working-directory: rust

      - name: Test
        run: cargo test --features lichen-link/schnorr,lichen-link/std
        working-directory: rust

      - name: Clippy
        run: cargo clippy --features lichen-link/schnorr,lichen-link/std -- -D warnings
        working-directory: rust

      - name: Format check
        run: cargo fmt --check
        working-directory: rust

  cppcheck:
    name: C static analysis (cppcheck)
    runs-on: ubuntu-latest
    # Informational for now: cppcheck without the Zephyr preprocessor state
    # reports syntax errors on macro-heavy files (BT_GATT_CCC,
    # MODEM_CHAT_MATCHES_DEFINE) and flags vendored code (monocypher) that
    # the safety policy exempts. Keep the output visible without gating
    # until the finding set is triaged and suppressed deliberately.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck
        run: cppcheck --error-exitcode=1 --enable=warning,style,performance --suppress=missingIncludeSystem lichen/

  zephyr-native-sim:
    name: Zephyr native_sim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Check out to workspace root so lichen/ (the manifest repo) sits
        # alongside zephyr/ — the standard west T2 workspace layout.

      - name: Set SOURCE_DATE_EPOCH
        # The production build-epoch policy (lichen/cmake/lichen_build_epoch.cmake)
        # refuses to configure without a deterministic epoch.
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install system deps
        # gcc-multilib provides 32-bit headers needed by native_sim (-m32 build)
        run: sudo apt-get install -y --no-install-recommends cmake ninja-build gcc gcc-multilib

      - name: Install west and Python deps
        run: pip install west

      - name: Cache Zephyr checkout
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: zephyr
          key: zephyr-${{ hashFiles('lichen/west.yml') }}
          restore-keys: zephyr-

      - name: west init + update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: |
          west init -l lichen/
          west update

      - name: west init (manifest only, Zephyr from cache)
        if: steps.cache-zephyr.outputs.cache-hit == 'true'
        run: west init -l lichen/

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements.txt

      - name: west zephyr-export
        run: west zephyr-export

      - name: Build gateway (native_sim)
        run: west build -b native_sim lichen/apps/gateway -- -DZEPHYR_TOOLCHAIN_VARIANT=host

      - name: C static analysis (clang-tidy, informational)
        # Replaces the old standalone clang-tidy job, which ran without a
        # compilation database and errored on every file. This uses the
        # gateway build's compile_commands.json so includes and defines are
        # real. Informational for now: the safety-policy check list reports
        # ~1100 findings that are mostly Zephyr idiom (reserved identifiers
        # from Zephyr macros, generated-header macro parentheses,
        # misc-include-cleaner); gate once the list is curated.
        continue-on-error: true
        run: |
          sudo apt-get install -y --no-install-recommends clang-tidy
          # Strip GCC-only flags clang rejects from the host-gcc compile DB
          python3 - <<'PYEOF'
          import json
          db = json.load(open('build/compile_commands.json'))
          drop = ['-fno-freestanding', '-fno-reorder-functions', '-fno-defer-pop',
                  '-Wno-old-style-declaration', '--param=min-pagesize=0',
                  '-fno-printf-return-value']
          for e in db:
              for f in drop:
                  e['command'] = e['command'].replace(' ' + f + ' ', ' ')
          json.dump(db, open('build/compile_commands.json', 'w'))
          files = sorted({e['file'] for e in db if '/lichen/' in e['file']})
          open('tidy-files.txt', 'w').write('\n'.join(files))
          PYEOF
          xargs -a tidy-files.txt clang-tidy -p build --config-file=lichen/.clang-tidy --warnings-as-errors='*'

      - name: Build puck (native_sim)
        run: west build -b native_sim lichen/apps/puck --pristine -- -DZEPHYR_TOOLCHAIN_VARIANT=host

      - name: Test Meshtastic codec (native_sim)
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
        run: west twister -T lichen/tests/meshtastic_codec -p native_sim --inline-logs

      - name: Check Meshtastic payload guard (native_sim)
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
        run: scripts/zephyr-meshtastic-negative-builds.sh

  zephyr-hardware:
    name: Zephyr hardware targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # nRF52840 boards (ARM Cortex-M4F)
          - board: rak4631_nrf52840
            app: puck
            extra-conf: ""
          # Hardware-model-v2 name; "t_echo_nrf52840" is not a valid board
          # target in Zephyr 3.7 (t_echo has no hwmv1 compatibility alias).
          - board: t_echo/nrf52840
            app: puck
            extra-conf: ""
          - board: r1_neo/nrf52840
            app: gateway
            extra-conf: meshtastic_compat.conf
          # STM32WL boards (ARM Cortex-M4)
          - board: nucleo_wl55jc
            app: gateway
            extra-conf: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH
        # The production build-epoch policy (lichen/cmake/lichen_build_epoch.cmake)
        # refuses to configure without a deterministic epoch.
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install system deps
        run: sudo apt-get install -y --no-install-recommends cmake ninja-build

      - name: Install west
        run: pip install west

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.8/zephyr-sdk-0.16.8_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.8_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-0.16.8
          ./setup.sh -t arm-zephyr-eabi -h -c

      - name: Cache Zephyr checkout
        id: cache-zephyr
        uses: actions/cache@v4
        with:
          path: zephyr
          key: zephyr-${{ hashFiles('lichen/west.yml') }}
          restore-keys: zephyr-

      - name: west init + update
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: |
          west init -l lichen/
          west update

      - name: west init (manifest only, Zephyr from cache)
        if: steps.cache-zephyr.outputs.cache-hit == 'true'
        run: west init -l lichen/

      - name: Install Zephyr Python requirements
        run: pip install -r zephyr/scripts/requirements.txt

      - name: west zephyr-export
        run: west zephyr-export

      - name: Build ${{ matrix.app }} for ${{ matrix.board }}
        run: |
          if [ -n "${{ matrix.extra-conf }}" ]; then
            west build -b ${{ matrix.board }} lichen/apps/${{ matrix.app }} -- -DEXTRA_CONF_FILE=${{ matrix.extra-conf }}
          else
            west build -b ${{ matrix.board }} lichen/apps/${{ matrix.app }}
          fi
