name: Mutation Testing

on:
  schedule:
    # Run weekly on Sunday at 4am UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  rust-mutants:
    name: Rust mutation testing (cargo-mutants)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run mutation testing on lichen-link
        working-directory: rust/lichen-link
        run: |
          cargo mutants --timeout 60 --jobs 4 -- --features std,schnorr 2>&1 | tee mutants-link.log
        continue-on-error: true

      - name: Run mutation testing on lichen-schc
        working-directory: rust/lichen-schc
        run: |
          cargo mutants --timeout 60 --jobs 4 2>&1 | tee mutants-schc.log
        continue-on-error: true

      - name: Run mutation testing on lichen-coap
        working-directory: rust/lichen-coap
        run: |
          cargo mutants --timeout 60 --jobs 4 2>&1 | tee mutants-coap.log
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        with:
          name: rust-mutation-results
          path: rust/*/mutants*.log

      - name: Create beads from surviving mutants
        if: always()
        run: |
          # Parse mutation logs and create beads for survivors
          for log in rust/*/mutants*.log; do
            crate=$(dirname "$log" | xargs basename)
            echo "Checking $crate for surviving mutants..."

            # Count survivors
            survivors=$(grep -c "SURVIVED" "$log" 2>/dev/null || echo "0")
            if [ "$survivors" -gt 0 ]; then
              echo "Found $survivors surviving mutants in $crate"
              # First 5 survivors as beads
              grep "SURVIVED" "$log" | head -5 | while read -r line; do
                echo "  Mutant: $line"
              done
            fi
          done
        continue-on-error: true

  python-mutmut:
    name: Python mutation testing (mutmut)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv mutmut
          uv sync --locked --all-extras --dev

      - name: Run mutation testing on critical modules
        run: |
          # Test critical modules only (full codebase takes too long)
          uv run mutmut run \
            --paths-to-mutate=src/lichen/link/,src/lichen/schc/,src/lichen/crypto/ \
            --runner="uv run pytest tests/ -x -q --timeout=30" \
            --no-progress \
            2>&1 | tee mutmut.log
        timeout-minutes: 90
        continue-on-error: true

      - name: Generate mutation report
        run: |
          uv run mutmut results || true
          uv run mutmut html || true
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        with:
          name: python-mutation-results
          path: |
            python/mutmut.log
            python/html/
            python/.mutmut-cache

      - name: Summary of surviving mutants
        if: always()
        run: |
          echo "=== MUTATION TESTING SUMMARY ==="
          uv run mutmut results 2>/dev/null | head -50 || echo "No results yet"
        continue-on-error: true
