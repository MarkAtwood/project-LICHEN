name: Cross-Implementation Interop

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run daily at 2am UTC
    - cron: '0 2 * * *'

permissions:
  contents: read

# Cross-language vectors plus implementation-specific protocol gates.
# Every job below must pass for interop-status to succeed.

jobs:
  frame-parser-interop:
    name: Python→Rust Frame Parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build frame-parser
        run: |
          cd rust
          cargo build --release -p lichen-apps --bin frame-parser

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run Python→Rust interop tests
        env:
          LICHEN_RUN_CROSS_IMPL: "1"
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToRust -v

  multinode-simulator:
    name: Multi-Node Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run multi-node tests
        run: |
          cd python
          uv run pytest tests/sim/test_multinode.py -v --timeout=60

      - name: Run cross-impl baseline tests
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToPythonBaseline -v

  vector-compatibility:
    name: Shared Vector and Zephyr Link Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Regenerate vectors (should be no-op)
        run: |
          uv run --project python python test/vectors/generate.py
          git diff --exit-code -- test/vectors
          test -z "$(git ls-files --others --exclude-standard -- test/vectors)"

      - name: Python vector tests
        run: |
          cd python
          uv run pytest tests/test_vectors.py -v

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Rust vector tests
        run: |
          cd rust
          cargo test -p lichen-link --features std,schnorr \
            --test shared_vectors -- --nocapture

      - name: Install Zephyr deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc device-tree-compiler
          python -m pip install west

      - name: Setup Zephyr workspace
        run: |
          west init -l lichen/
          west update
          python -m pip install -r zephyr/scripts/requirements.txt
          west zephyr-export

      - name: Zephyr link tests
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          west twister -T lichen/tests/link_crypto \
            -p native_sim/native/64 --inline-logs

  announce-interop:
    name: Announce Protocol Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test announce coordinate encoding
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev
          uv run pytest tests/test_vectors.py -v -k announce

  interop-status:
    name: Interop Status
    runs-on: ubuntu-latest
    permissions: {}
    if: ${{ always() }}
    needs:
      - frame-parser-interop
      - multinode-simulator
      - vector-compatibility
      - announce-interop
    steps:
      - name: Require every interop job to succeed
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'all(.[]; .result == "success")' <<<"$RESULTS"
