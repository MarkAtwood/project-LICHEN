name: Cross-Implementation Interop

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run daily at 2am UTC
    - cron: '0 2 * * *'

permissions:
  contents: read

# Cross-language vectors plus implementation-specific protocol gates.
# Every job below must pass for interop-status to succeed.

jobs:
  frame-parser-interop:
    name: Python→Rust Frame Parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build frame-parser
        run: |
          cd rust
          cargo build --release -p lichen-apps --bin frame-parser

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run Python→Rust interop tests
        env:
          LICHEN_RUN_CROSS_IMPL: "1"
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToRust -v

  multinode-simulator:
    name: Multi-Node Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run multi-node tests
        run: |
          cd python
          uv run pytest tests/sim/test_multinode.py -v --timeout=60

      - name: Run cross-impl baseline tests
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToPythonBaseline -v

  vector-compatibility:
    name: Shared Vector and Zephyr Link Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Regenerate vectors (should be no-op)
        run: |
          cd python
          PYTHONPATH=src python3 ../test/vectors/generate.py
          # Check for uncommitted changes
          vector_status="$(git -C .. status --porcelain --untracked-files=all -- 'test/vectors/*.json')"
          if [ -n "$vector_status" ]; then
            echo "ERROR: Vectors are out of date!"
            echo "$vector_status"
            git -C .. diff -- 'test/vectors/*.json'
            exit 1
          fi

      - name: Python vector tests
        run: |
          cd python
          uv run pytest tests/test_vectors.py -v

      - name: C signed-frame oracle
        run: |
          cmake -S lichen/tests/schnorr48 -B /tmp/lichen-schnorr48
          cmake --build /tmp/lichen-schnorr48
          ctest --test-dir /tmp/lichen-schnorr48 --output-on-failure
          cmake -S lichen/tests/frame -B /tmp/lichen-frame
          cmake --build /tmp/lichen-frame
          ctest --test-dir /tmp/lichen-frame --output-on-failure
          cmake -S lichen/tests/link_ctx -B /tmp/lichen-link-ctx
          cmake --build /tmp/lichen-link-ctx
          ctest --test-dir /tmp/lichen-link-ctx --output-on-failure

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Rust vector tests
        run: |
          cd rust
          cargo test -p lichen-link --no-default-features --test shared_vectors
          cargo test -p lichen-link --all-features

      - name: Install Zephyr deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc device-tree-compiler
          python -m pip install west

      - name: Setup Zephyr workspace
        run: |
          west init -l lichen/
          west update
          python -m pip install -r zephyr/scripts/requirements.txt
          west zephyr-export

      - name: Zephyr link tests
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          # Run SCHC and link tests with vectors
          west twister -T lichen/tests/schc -T lichen/tests/link_crypto \
            -p native_sim --inline-logs
        continue-on-error: true  # Until Zephyr tests are wired to JSON vectors

  wire-format-python-to-rust:
    name: Python to Rust Wire Parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Generate wire samples from Python
        # The original version of this step was written against imagined
        # APIs (lichen.schc.rules.compress, lichen.coap.message) and never
        # ran. This uses the real LichenFrame API.
        run: |
          cd python
          uv run python3 - <<'PYEOF'
          from lichen.link.frame import AddrMode, LichenFrame, MicLength
          import json

          samples = []

          # Link frames across the epoch/seqnum corners
          for epoch in [0, 127, 255]:
              for seqnum in [0, 1, 32767, 65535]:
                  frame = LichenFrame(
                      epoch=epoch,
                      seqnum=seqnum,
                      dst_addr=b"",
                      payload=b"test" * 10,
                      mic=bytes(MicLength.BITS32.mic_len),
                      addr_mode=AddrMode.NONE,
                      mic_length=MicLength.BITS32,
                  )
                  samples.append({
                      "type": "link_frame",
                      "epoch": epoch,
                      "seqnum": seqnum,
                      "bytes": frame.to_bytes().hex(),
                  })

          with open("/tmp/wire_samples.json", "w") as f:
              json.dump(samples, f, indent=2)

          print(f"Generated {len(samples)} wire samples")
          PYEOF

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Build Rust frame parser
        run: cargo build --release -p lichen-apps --bin frame-parser
        working-directory: rust

      - name: Parse and validate samples in Rust
        run: |
          python3 - <<'PYEOF'
          import json
          import subprocess

          with open("/tmp/wire_samples.json") as f:
              samples = json.load(f)

          for sample in samples:
              result = subprocess.run(
                  ["rust/target/release/frame-parser", "--hex", sample["bytes"]],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              parsed = json.loads(result.stdout)
              assert parsed["epoch"] == sample["epoch"]
              assert parsed["seqnum"] == sample["seqnum"]
              assert parsed["payload"] == (b"test" * 10).hex()
              assert parsed["total_len"] == len(bytes.fromhex(sample["bytes"]))

          print(f"Rust parsed and validated {len(samples)} Python frames")
          PYEOF

  announce-interop:
    name: Announce Protocol Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test announce coordinate encoding
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev
          uv run pytest tests/test_vectors.py -v -k announce

  interop-status:
    name: Interop Status
    runs-on: ubuntu-latest
    needs: [frame-parser-interop, multinode-simulator, vector-compatibility, wire-format-python-to-rust, announce-interop]
    if: always()
    steps:
      - name: Install tooling
        run: sudo apt-get update -q && sudo apt-get install -y jq
      - name: Report and validate interop job statuses
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "Interop job statuses:"
          jq -r 'to_entries[] | "  \(.key): \(.value.result)"' <<<"$RESULTS"
          echo "Specific failed jobs with status:"
          jq -r 'to_entries[] | select(.value.result != "success") | "  \(.key): \(.value.result)"' <<<"$RESULTS" || echo "  (no failures or jq parse error)"
          if ! jq -e 'all(.[]; .result == "success")' <<<"$RESULTS" >/dev/null; then
            echo "FAILURE: Not all interop jobs succeeded (see failed jobs above)."
            if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
              echo "Creating tracking bead..."
              bd create "Interop status failure: dependent job failed" \
                --type=bug \
                --priority=1 \
                --body="interop-status job failed. See workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
See job status list and specific failed jobs above." || echo "bd unavailable (expected in minimal runners); failure reported by job status."
            fi
            exit 1
          fi
          echo "All interop jobs succeeded."

      - name: Create tracking bead (on main failure)
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          echo "Creating tracking bead for interop failure..."
          bd create "Interop status failure: dependent job failed" \
            --type=bug \
            --priority=1 \
            --body="interop-status job failed. See workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. Jobs: frame-parser-interop, multinode-simulator, vector-compatibility, wire-format-python-to-rust, announce-interop. See .github/workflows/interop.yml for details." || echo "bd unavailable (expected in minimal runners); failure reported by job status."
        continue-on-error: true
