name: Cross-Implementation Interop

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Run daily at 2am UTC
    - cron: '0 2 * * *'

# This workflow validates that Python, Rust, and Zephyr implementations
# produce IDENTICAL wire bytes for all protocol vectors.

jobs:
  frame-parser-interop:
    name: Python→Rust Frame Parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build frame-parser
        run: |
          cd rust
          cargo build --release -p lichen-apps --bin frame-parser

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run Python→Rust interop tests
        env:
          LICHEN_RUN_CROSS_IMPL: "1"
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToRust -v

  multinode-simulator:
    name: Multi-Node Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Run multi-node tests
        run: |
          cd python
          uv run pytest tests/sim/test_multinode.py -v --timeout=60

      - name: Run cross-impl baseline tests
        run: |
          cd python
          uv run pytest tests/sim/test_cross_impl_interop.py::TestPythonToPythonBaseline -v

  vector-compatibility:
    name: Shared Vector Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Regenerate vectors (should be no-op)
        run: |
          cd python
          PYTHONPATH=src python3 ../test/vectors/generate.py
          # Check for uncommitted changes
          vector_status="$(git -C .. status --porcelain --untracked-files=all -- 'test/vectors/*.json')"
          if [ -n "$vector_status" ]; then
            echo "ERROR: Vectors are out of date!"
            echo "$vector_status"
            git -C .. diff -- 'test/vectors/*.json'
            exit 1
          fi

      - name: Python vector tests
        run: |
          cd python
          uv run pytest tests/test_vectors.py -v

      - name: C signed-frame oracle
        run: |
          cmake -S lichen/tests/schnorr48 -B /tmp/lichen-schnorr48
          cmake --build /tmp/lichen-schnorr48
          ctest --test-dir /tmp/lichen-schnorr48 --output-on-failure
          cmake -S lichen/tests/frame -B /tmp/lichen-frame
          cmake --build /tmp/lichen-frame
          ctest --test-dir /tmp/lichen-frame --output-on-failure

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Rust vector tests
        run: |
          cd rust
          cargo test -p lichen-link --no-default-features --test shared_vectors
          cargo test -p lichen-link --all-features

      - name: Install Zephyr deps
        run: |
          sudo apt-get install -y cmake ninja-build gcc gcc-multilib
          pip install west

      - name: Setup Zephyr workspace
        run: |
          west init -l lichen/
          west update
          pip install -r zephyr/scripts/requirements.txt
          west zephyr-export

      - name: Zephyr vector tests
        env:
          ZEPHYR_TOOLCHAIN_VARIANT: host
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          # Run SCHC and link tests with vectors
          west twister -T lichen/tests/schc -T lichen/tests/link_crypto \
            -p native_sim --inline-logs
        continue-on-error: true  # Until Zephyr tests are wired to JSON vectors

  wire-format-roundtrip:
    name: Wire Format Roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev

      - name: Generate wire samples from Python
        run: |
          cd python
          uv run python3 -c "
          from lichen.link.frame import LichenFrame
          from lichen.schc.rules import compress, decompress
          from lichen.coap.message import CoapMessage, MessageType, Code
          import json

          samples = []

          # Generate various frame types
          for epoch in [0, 127, 255]:
              for seqnum in [0, 1, 32767, 65535]:
                  frame = LichenFrame.build(
                      epoch=epoch,
                      seqnum=seqnum,
                      payload=b'test' * 10,
                      addr_mode=0,
                  )
                  samples.append({
                      'type': 'link_frame',
                      'epoch': epoch,
                      'seqnum': seqnum,
                      'bytes': frame.hex(),
                  })

          # Generate CoAP messages
          for code in [Code.GET, Code.POST, Code.CONTENT]:
              msg = CoapMessage(
                  msg_type=MessageType.CON,
                  code=code,
                  message_id=12345,
                  token=b'\\x01\\x02\\x03\\x04',
                  payload=b'hello',
              )
              samples.append({
                  'type': 'coap',
                  'code': code.name,
                  'bytes': msg.to_bytes().hex(),
              })

          with open('/tmp/wire_samples.json', 'w') as f:
              json.dump(samples, f, indent=2)

          print(f'Generated {len(samples)} wire samples')
          "

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate samples in Rust
        run: |
          cd rust
          # TODO: Add Rust validation of /tmp/wire_samples.json
          echo "Rust validation pending implementation"

  announce-interop:
    name: Announce Protocol Interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test announce coordinate encoding
        run: |
          cd python
          pip install uv
          uv sync --locked --all-extras --dev
          uv run pytest tests/test_vectors.py -v -k announce

  create-beads-on-failure:
    name: Create Beads for Interop Failures
    runs-on: ubuntu-latest
    needs: [vector-compatibility, wire-format-roundtrip, announce-interop]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create interop failure bead
        run: |
          bd create "Cross-implementation interop test failure" \
            --type bug \
            --priority P1 \
            --body "One or more implementations produced different wire bytes. Check the interop workflow logs."
        continue-on-error: true
