[package]
name = "lichen-coap-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.lichen-coap]
path = ".."

[[bin]]
name = "fuzz_coap_parse"
path = "fuzz_targets/fuzz_coap_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_cbor"
path = "fuzz_targets/fuzz_cbor.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_block"
path = "fuzz_targets/fuzz_block.rs"
test = false
doc = false
bench = false
