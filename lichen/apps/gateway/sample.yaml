sample:
  name: LICHEN gateway app
  description: Build-only coverage for the LICHEN gateway application entry point.
common:
  tags:
    - lichen
    - gateway
  build_only: true
  extra_args:
    - LICHEN_RELEASE_EPOCH_UNIX=1710000000
tests:
  app.lichen.gateway.native_sim:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
  app.lichen.gateway.qemu_x86:
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86
  app.lichen.gateway.rak2287:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_args:
      - CONFIG_LICHEN_GATEWAY_COORDINATION=y
    tags:
      - rak2287
      - sx1302
