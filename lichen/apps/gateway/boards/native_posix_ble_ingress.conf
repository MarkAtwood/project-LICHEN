# Research from bead project-LICHEN-2auf.59.4.1.3.2.2.2.1: Kconfig for native_posix BLE ingress (no link layer)
# Analyzed prj.conf from ble_ingress (ZTEST/NET_L2_DUMMY/NET_IPV6), gateway (full L2/LINK/RPL/COAP), ble_ipsp_transport (BT + BLE_TRANSPORT + explicit L2=n).
# Required CONFIGs for BLE/IPSP/native_posix (excludes link.35.6):
# BLE: BT=y PERIPHERAL=y MAX_CONN=1 DEVICE_NAME BT_HCI=y
# LICHEN-BLE: LORA_LICHEN_BLE=y (selects NET_L2_DUMMY APP_INTERFACE), LICHEN_BLE_TRANSPORT=y BLE_SLIP=y REQUIRE_SECURE=n
# Disable link: LICHEN=y LINK=n LORA_L2=n L2=n
# Networking: NETWORKING=y IPV6=y UDP=y SOCKETS=y ROUTE=y NET_L2_DUMMY=y IF_MAX_IPV6=2 PKT/BUF counts
# Native: ENTROPY=y TEST_RANDOM_GENERATOR=y LOG=3 MAIN_STACK=4096 + safety
# IPSP: optional (NET_L2_BT unavailable in v3.7; disabled)
# Build cmd: SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) west build -b native_sim --pristine lichen/apps/gateway -d build/ble -DOVERLAY_CONFIG=boards/native_posix_ble_ingress.overlay -DEXTRA_CONF_FILE=boards/native_posix_ble_ingress.conf -DLICHEN_RELEASE_EPOCH_UNIX=1722470400

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_DEVICE_NAME="LICHEN-BLE-INGRESS"
CONFIG_BT_HCI=y
CONFIG_BT_HCI_RAW=n

CONFIG_LORA_LICHEN_BLE=y
CONFIG_LICHEN_BLE_TRANSPORT=y
CONFIG_LICHEN_BLE_SLIP=y
CONFIG_LICHEN_BLE_TRANSPORT_REQUIRE_SECURE=n

# Stub/disable full link layer and LoRa (avoids link layer deps on native_posix)
CONFIG_LICHEN=y
CONFIG_LICHEN_LINK=n
CONFIG_LICHEN_LORA_L2=n
CONFIG_LICHEN_L2=n

# Break Kconfig dependency loop for native_posix BLE ingress build
# (CRC <-> MCUMGR <-> ZCBOR <-> LICHEN_COAP_KEYS <-> LICHEN_SLIP_TRANSPORT <-> UART_INTERRUPT_DRIVEN)
# per project-LICHEN-2auf.59.4.1.3.2.2.2.3
CONFIG_MCUMGR=n
CONFIG_UART_MCUMGR=n
CONFIG_LICHEN_COAP=n
CONFIG_LICHEN_COAP_SERVER=n
CONFIG_LICHEN_COAP_CONFIG=n
CONFIG_LICHEN_COAP_KEYS=n
CONFIG_LICHEN_OSCORE=n
CONFIG_LICHEN_SENML=n
CONFIG_LICHEN_SLIP_TRANSPORT=n
CONFIG_ZCBOR=n
CONFIG_CRC=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_MCUMGR_GRP_FS=n
CONFIG_FILE_SYSTEM=n

# BLE/LCI specific networking (NET_L2_DUMMY selected by LORA_LICHEN_BLE; keep gateway routing)
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_ROUTE=y
CONFIG_NET_L2_DUMMY=y
CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# Native sim support
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_MAIN_STACK_SIZE=4096

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
