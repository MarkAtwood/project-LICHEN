#
# LilyGO T-Deck gateway config — ESP32-S3 + SX1262 + WiFi backhaul (border router).
# project-LICHEN-qfh1: consolidated from worker24/spkj + prior merges; all <<<<<<< ======= >>>>>>> markers cleaned from gateway.rs/lichend.rs/rf_health.rs/routing.rs/bridge.rs/schnorr.rs and related Rust files. Prefer latest code with test vectors, style-passing, no dead code per AGENTS.md. t_deck conf updated.
# LICHEN_HAL with board capability boundary: hardware features (BLE/serial/display/GNSS/battery/PMIC/external flash) intentionally disabled pending validation (follow-up beads for display/input/LCI per worker23).
# No SLIP (USB CDC for LCI/console avoids UART_PIPE chosen-node dependency). Bench-only insecure CRC32 MIC + dev provisioning for T-Echo/T1000-E interop.
# TC_TX prevents workqueue deadlock on TX; tuned stacks prevent Xtensa overflows (Ed25519/SCHC/net/WiFi/RPL paths).
# Bench tuning: short RX timeout, low TX power (avoids saturation), RX1 delay, NVS epoch persist, WiFi 6LBR + RPL root + prefix delegation.
# Matches test/vectors/ and puck radio settings. Update SSID/PSK/MIC before production.
#
# Use -DEXTRA_CONF_FILE=boards/t_deck_esp32s3_procpu_display_validation.conf (or sd_*) for
# targeted hardware validation; do not rely on FILE_SUFFIX for fragments.

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# Hardware intentionally disabled pending validation (per worker23 beads).
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n

# No SLIP (uses USB CDC for LCI/console; avoids UART_PIPE chosen-node dependency).
CONFIG_SLIP=n

# Bench-only insecure link (CRC32 MIC fallback). Enables TX without full key exchange.
# Peers: bench pucks (T-Echo, T1000-E). Replace with proper keys for production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Dedicated TC thread prevents workqueue deadlock on TX (lora_send + SX126x TX-done).
CONFIG_NET_TC_TX_COUNT=1

# Stack sizes prevent overflows on Xtensa (Ed25519/SCHC in L2 RX, net paths).
# Per heltec-9ppq + t-deck fixes from multiple workers.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288
CONFIG_MAIN_STACK_SIZE=8192

# Bench tuning: short RX timeout, low TX power (avoids saturation), RX1 delay, epoch persist in NVS.
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000
CONFIG_LICHEN_LORA_TX_POWER=2
CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# WiFi 6LBR backhaul + RPL root (sl32.1 pattern). Tuned buffers for stability (parity with Heltec V3).
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8
CONFIG_HEAP_MEM_POOL_SIZE=131072
