# LilyGO T-Deck gateway config — ESP32-S3 + SX1262 + WiFi backhaul (border router mode)
# Consolidated resolution of project-LICHEN-rh9u (worker19), project-LICHEN-etah (worker21),
# project-LICHEN-m48r (worker23), project-LICHEN-iwmd/fyph (worker24) merge conflicts.
# Mirrors resolved Heltec WiFi LoRa 32 V3 (project-LICHEN-9ppq). Includes T-Deck HAL,
# disabled hardware flags, bench dev provisioning (insecure CRC32 MIC + peer EUIs),
# overflow-preventing stack sizes (12288+), WiFi 6LBR+RPL root+prefix delegation,
# NVS epoch persist, ESP WiFi buffers. Bench SSID/PSK only; update for production.
# Matches firmware-board-capability-matrix and test/vectors/ expectations.

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# Hardware present or expected but intentionally disabled until validated or
# bound by the display/input/local-client/GNSS/battery/PMIC/external-flash follow-up beads (worker23).
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n

# No SLIP (uses USB CDC for LCI/console; T-Deck USB CDC for console/LCI later).
# Bench insecure CRC32 MIC + dev provisioning (replace for production).
# Peers for bench pucks (T-Echo, T1000-E etc.). Replace with proper keys for production.
CONFIG_SLIP=n
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

