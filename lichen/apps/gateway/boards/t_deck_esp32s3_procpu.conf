# Lilygo T-Deck gateway config — ESP32-S3 + SX1262
# Reaches CoAP AUTOSTART + observable resources (/status with notify)

CONFIG_LORA_SX126X=y

# Board capability boundary for app-facing hardware decisions.
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_COAP_STATUS=y

# Hardware present or expected but intentionally disabled until validated or
# bound by the display/input/local-client follow-up Beads.
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n

# The default gateway config enables wired SLIP, which requires a
# zephyr,uart-pipe chosen node; keep it disabled until a USB CDC or UART0
# serial endpoint is modeled. BLE NUS also stays disabled until egress is wired
# so the board does not advertise an incomplete local-client service.
CONFIG_SLIP=n
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_NET_IPV6_NBR_CACHE=y
CONFIG_NET_IPV6_MLD=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_TC_TX_COUNT=1
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=8192

# Persist the link TX epoch across reboots (bd 3uhb): advance it +1 each
# boot so the gateway's counter stays ahead of peers' replay windows,
# eliminating the ~50% reboot replay coin-flip. Settings-on-NVS backed by
# the board's storage_partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# RX1-style response delay (bd fe1z): give a half-duplex requester time to
# switch from TX to RX before we answer, so the reply is not missed during
# its turnaround.
CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100
