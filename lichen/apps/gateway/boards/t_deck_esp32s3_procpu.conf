# Lilygo T-Deck gateway config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y

# T-Deck local-client transport is not bound yet.  The default gateway config
# enables wired SLIP, which requires a zephyr,uart-pipe chosen node; keep it
# disabled until project-LICHEN-h7t5.7.6 selects USB CDC, UART0, or BLE.
CONFIG_SLIP=n
