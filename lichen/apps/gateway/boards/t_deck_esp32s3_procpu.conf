# LilyGO T-Deck gateway config — ESP32-S3 + SX1262 + WiFi backhaul (border router mode)
# Mirrors resolved Heltec V3 (project-LICHEN-9ppq) but with UI/keyboard/SD/display/GNSS/PMIC/external-flash
# intentionally disabled until validated per worker23 follow-up Beads.

# Resolved multi-way merge conflict for project-LICHEN-3omm:
# - Base T-Deck + LICHEN_HAL=y/BOARD_NAME + full HAS_*=n list + SLIP=n standalone (worker3, worker17, worker23, t-deck init)
# - Stack tuning (L2 RX for Ed25519+SCHC, NET RX/TX for signing/net, MAIN_STACK) + overflow/crash prevention (worker23 t-deck fix, worker12 via 9ppq; bumped to match Heltec resolution)
# - Bench security (insecure CRC32 MIC fallback + L2_DEV_PROVISIONING with bench puck EUIs) + RX timeout/TX power=2 + TC_TX deadlock avoidance (worker3)
# - WiFi 6LBR backhaul, prefix delegation, NET_L2_WIFI_MGMT/ETHERNET + ESP buffer/heap tuning + RPL_ROOT (worker14, worker12, worker17)
# - Epoch persist, RX1 delay, flash/NVS/SETTINGS (common across workers)
# - Battery= n (worker5/23; Heltec-9ppq enabled it + SENSOR/ADC). Canonical version for t_deck gateway. No duplicate lines. SSID/PSK for bench only — replace for production. Test with puck builds and vectors in test/vectors/.
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# Hardware present or expected but intentionally disabled until validated or
# bound by the display/input/local-client/SD/GNSS/PMIC follow-up Beads (worker23).
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n

# Standalone WiFi 6LBR — no SLIP (T-Deck USB CDC for console/LCI later; avoids UART_PIPE chosen-node requirement).
CONFIG_SLIP=n

# Bench insecure CRC32 MIC + dev provisioning (replace with CONFIG_LICHEN_LINK_KEY for production).
# Peers = bench pucks (T-Echo/T1000-E EUIs); enables TX without full key setup. See LICHEN_L2_DEV_PROVISIONING help.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Run net TX on dedicated TC thread to avoid workqueue deadlock with lora_send() + SX126x driver (boot ND/MLD vs TX-done work item).
CONFIG_NET_TC_TX_COUNT=1

# RX-path stacks: L2 RX (Monocypher Ed25519 + SCHC), net RX (IPv6/UDP/CoAP), TX (signing). Bumped per worker23 + heltec-9ppq (bd r002) to prevent Xtensa overflows/trampling.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288
CONFIG_MAIN_STACK_SIZE=8192

# Short RX window (sx12xx preamble detection holds it open), bench TX power (2 dBm avoids saturation at close range), RX1 delay, epoch persist for replay protection across reboots (NVS-backed).
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000
CONFIG_LICHEN_LORA_TX_POWER=2
CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# WiFi backhaul 6LBR (RPL root + prefix delegation, sl32.1 pattern). Tuned ESP32-S3 WiFi buffers/heaps for stability + RPL (parity with resolved Heltec V3).
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8
CONFIG_HEAP_MEM_POOL_SIZE=131072
