# Lilygo T-Deck gateway config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y

# Board capability boundary for app-facing hardware decisions.
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# Hardware present or expected but intentionally disabled until validated or
# bound by the display/input/local-client follow-up Beads.
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n

# The default gateway config enables wired SLIP, which requires a
# zephyr,uart-pipe chosen node; keep it disabled until a USB CDC or UART0
# serial endpoint is modeled. BLE NUS also stays disabled until egress is wired
# so the board does not advertise an incomplete local-client service.
CONFIG_SLIP=n
