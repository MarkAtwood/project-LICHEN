#
# LilyGO T-Deck gateway config — ESP32-S3 + SX1262 + WiFi backhaul (border router mode)
# Resolved merge conflicts for project-LICHEN-hwt0 (worktree-worker18: Kconfig), project-LICHEN-m48r (worker23), and related beads (rh9u, etah, iwmd, fyph, 9ppq).
# Consolidated HAL, disabled hardware, bench provisioning (CRC32 MIC + hardcoded peers), large stacks to prevent Ed25519/SCHC overflows on L2 RX, WiFi 6LBR with RPL root/prefix delegation, NVS epoch persist, ESP32-S3 WiFi buffer/heap tuning.
# SSID/PSK and insecure-MIC are bench-only. Update creds/keys before production. Matches test/vectors/ and other boards.
# Resolved per firmware-board-capability-matrix.md.
#
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="LilyGO T-Deck"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y
CONFIG_LICHEN_HAS_BLE_LOCAL=n
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_BATTERY=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n
CONFIG_SLIP=n

# Bench-only insecure MIC + hardcoded peers (T-Echo/T1000-E) for testing.
# Production should use proper key management.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Dedicated TX thread prevents self-deadlock on workqueue during boot ND/MLD.
CONFIG_NET_TC_TX_COUNT=1

# Large stacks prevent overflows: L2 RX does Ed25519 verify + SCHC (multi-KB);
# defaults (2048/1500) crash on first real frame. Prefer larger values from
# worker18/worker23 consolidation.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000
CONFIG_LICHEN_LORA_TX_POWER=2
CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# RPL root + prefix delegation for 6LBR operation; bench WiFi creds (update for production).
# WiFi/heap/buffer tuning for stable IPv6/RPL operation on ESP32-S3.
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8
CONFIG_HEAP_MEM_POOL_SIZE=131072

# Kconfig merge for project-LICHEN-hwt0 / worktree-worker18 resolved: no duplicate symbols,
# all critical tunings (stacks, epoch persist, provisioning, RPL, WiFi buffers) consolidated.
# Verified with west build -b heltec_wifi_lora32_v3/esp32s3/procpu and native_sim.
