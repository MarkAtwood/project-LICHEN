# native_sim board config — overrides / supplements prj.conf

# LoRa loopback driver for testing without external simulator
CONFIG_LORA=y
CONFIG_LORA_LOOPBACK=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_LOOPBACK=y

# Alternatively, use the simulator driver (requires lichen-sim running):
# CONFIG_LORA_LICHEN_SIM=y
# CONFIG_LORA_LICHEN_SIM_HOST="127.0.0.1"
# CONFIG_LORA_LICHEN_SIM_PORT=4444
# CONFIG_LORA_LICHEN_SIM_NODE_ID="gw0"
# CONFIG_LORA_LICHEN_SIM_SIM_ID="lichen"
# CONFIG_NET_SOCKETS=y
# CONFIG_NET_SOCKETS_POSIX_NAMES=y

# native_sim uses the LoRa loopback/simulator driver, not Zephyr SLIP/TAP.
CONFIG_SLIP=n

# GNSS via NMEA on uart1 (PTY)
# Enable second UART port for GNSS NMEA injection
CONFIG_UART_NATIVE_POSIX_PORT_1_ENABLE=y
CONFIG_GNSS=y
CONFIG_GNSS_NMEA_GENERIC=y
