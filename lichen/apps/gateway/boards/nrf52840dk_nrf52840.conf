# nRF52840 DK board config — BLE UART gateway
# The nRF52840 has no built-in LoRa radio; pair with an external SX1262 via SPI.

# The DK gateway exposes the local client interface over BLE NUS, not Zephyr's
# wired SLIP driver.  Keep CONFIG_SLIP disabled so Zephyr does not require a
# zephyr,uart-pipe chosen node for this board.
CONFIG_SLIP=n

# The generic DK devicetree has no LoRa radio or lora0 alias.  Build this board
# as a BLE/CoAP gateway shell; LoRa-enabled nRF52840 boards provide overlays.
CONFIG_LORA=n
CONFIG_LICHEN_LORA_L2=n
CONFIG_LICHEN_L2=n

# BLE stack
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LICHEN"
CONFIG_BT_MAX_CONN=1

# Enable extended ATT MTU so large IPv6 packets need fewer notify chunks
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# LICHEN BLE UART feature
CONFIG_LORA_LICHEN_BLE=y
