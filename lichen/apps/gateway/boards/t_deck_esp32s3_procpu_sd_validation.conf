#
# Optional no-hardware T-Deck SD-card validation fragment.  Pass this
# explicitly with:
#
#   -DEXTRA_CONF_FILE=boards/t_deck_esp32s3_procpu_sd_validation.conf
#
# Do not use FILE_SUFFIX=sd for this check: suffixed board fragments replace
# the base app board fragment instead of extending it.

CONFIG_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_SDMMC=y

# Removable SD cards should use FAT for bring-up smoke tests.  Internal flash
# storage keeps the existing product partitioning and is not enabled here.
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=n

# Provide an interactive UART smoke path for physical follow-up without adding
# product app SD logic.  Keep mkfs disabled so shell mounts do not reformat a
# non-sacrificial removable card on mount failure.
CONFIG_SHELL=y
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_SHELL_TEST_COMMANDS=y
