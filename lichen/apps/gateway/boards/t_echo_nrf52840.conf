# T-Echo gateway config — nRF52840 + SX1262 + BLE

# The T-Echo gateway exposes the local client interface over BLE NUS, not
# Zephyr's wired SLIP driver.  Keep CONFIG_SLIP disabled so Zephyr does not
# require UART/serial support for this BLE-only gateway variant.
CONFIG_SLIP=n

# SX1262 LoRa driver
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# BLE UART bridge (LICHEN gateway feature)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LICHEN"
CONFIG_BT_MAX_CONN=1

CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

CONFIG_LORA_LICHEN_BLE=y
CONFIG_LORA_LICHEN_BLE_LEGACY_NUS=y
CONFIG_LICHEN_HAS_BLE_LOCAL=y
