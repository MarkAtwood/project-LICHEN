# Muzi Works R1 Neo gateway config — nRF52840 + SX1262 + BLE

# The R1 Neo gateway exposes the local client interface over BLE NUS, not
# Zephyr's wired SLIP driver.
CONFIG_SLIP=n

CONFIG_LORA_SX126X=y

# BLE UART bridge (LICHEN gateway feature)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LICHEN"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_LORA_LICHEN_BLE=y
CONFIG_LORA_LICHEN_BLE_LEGACY_NUS=y

# Native USB is available for console and future wired local-client bring-up.
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0102
CONFIG_USB_DEVICE_PRODUCT="LICHEN R1 Neo Gateway"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"

# Board capability boundary for app-facing hardware decisions.
CONFIG_LICHEN_HAL=y
CONFIG_LICHEN_BOARD_NAME="Muzi Works R1 Neo"
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_HAS_BLE_LOCAL=y
CONFIG_LICHEN_HAS_SERIAL_LOCAL=n
CONFIG_LICHEN_HAS_BUTTONS=y
CONFIG_LICHEN_HAS_LEDS=y
CONFIG_LICHEN_UI_PROFILE_TRACKER=y

# Hardware present but intentionally disabled until validated or modeled.
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_SENSOR=y
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n
