#
# Optional no-hardware T-Deck display validation fragment.  Pass this
# explicitly with:
#
#   -DEXTRA_CONF_FILE=boards/t_deck_esp32s3_procpu_display_validation.conf
#
# Do not use FILE_SUFFIX=display for this check: suffixed board fragments
# replace the base app board fragment instead of extending it.

CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y
CONFIG_MIPI_DBI_SPI=y
CONFIG_ST7789V=y
CONFIG_LICHEN_HAS_DISPLAY=y
