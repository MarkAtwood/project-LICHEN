# nucleo_wl55jc board config — hardware-specific overrides

# STM32WL55 integrated SubGHz radio (not external SX12XX)
# ponytail: LORA_SX12XX is for external SPI chips like RAK4631
# The STM32WL uses LORA_STM32WL_SUBGHZ_RADIO via devicetree
CONFIG_LORA_STM32WL_SUBGHZ_RADIO=y
CONFIG_LICHEN_HAS_LORA=y

# SLIP bridge over UART to upstream host
CONFIG_SLIP=y
CONFIG_SLIP_TAP=y
CONFIG_NET_SLIP_TAP=y
CONFIG_LICHEN_HAS_SERIAL_LOCAL=y
