# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# Standalone LoRa/CoAP gateway — no wired SLIP bridge to an upstream host.
# Keep CONFIG_SLIP disabled so Zephyr does not require a zephyr,uart-pipe
# chosen node (SLIP selects UART_PIPE, which needs that chosen node).
CONFIG_SLIP=n

# No AES-CCM link key is provisioned on this bench gateway. Without a MIC
# method lichen_link_tx() returns -EINVAL on every frame ("TX frame build
# failed: invalid argument (-22)"). Enable the CRC32 MIC fallback so the L2
# stack can transmit. INSECURE: CRC32 is error-detection only, not
# authentication — replace with CONFIG_LICHEN_LINK_KEY for production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y

# SECURITY: bench-only dev link provisioning — publicly-known fixed Schnorr
# key + one static peer (see LICHEN_L2_DEV_PROVISIONING help). Peer is the
# bench T-Echo: SHA-256("LICHEN-EUI64-v1" || FICR DEVICEID bytes
# 2BE0BCC87606D748)[0:8] with U/L set, I/G cleared (lora_l2.c derivation).
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10"

# Run net TX on a dedicated traffic-class thread. With TC_TX_COUNT=0, TX runs
# in the caller's context — boot-time ND/MLD sends run on the system workqueue,
# where lora_send() blocks waiting for the SX126x TX-done… which the driver
# delivers via a work item on that same workqueue. The self-deadlock times out
# after 2x airtime ("Packet transmission failed!", TX failed -11).
CONFIG_NET_TC_TX_COUNT=1

# RX-path stacks: the LoRa L2 RX thread runs Monocypher Ed25519 verify +
# SCHC decompress (multi-KB stack), and the net RX thread carries the
# decompressed packet through IPv6/UDP/socket delivery. The 2048/1500
# defaults overflow and crash on the first real received frame (bd r002).
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=4096

# Short RX window; boundary-straddling frames are safe because the sx12xx
# driver holds the window open on preamble/header detection instead of
# aborting mid-reception (local zephyr patch, see patches/README.md).
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000

# BENCH: nodes sit antenna-to-antenna (RX at ~-1 dBm). 14 dBm saturates the
# peer's receiver — short frames squeak through, but >150 B frames (Block2
# /status responses) were lost ~60-100% until power dropped; at 2 dBm the
# same transfers run 100%. Restore 14 dBm (the default) for field range.
CONFIG_LICHEN_LORA_TX_POWER=2
# The TC TX thread runs lichen_l2_send -> Ed25519 SIGNING for every
# outbound frame (CoAP responses included). 1200 B default silently
# overflows on Xtensa and tramples the neighbor's saved context — crash
# appears later in xtensa_restore_high_regs (bd r002).
CONFIG_NET_TX_STACK_SIZE=8192
