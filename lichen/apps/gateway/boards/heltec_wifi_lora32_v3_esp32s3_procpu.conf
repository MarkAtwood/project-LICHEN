# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262
CONFIG_UART_INTERRUPT_DRIVEN=y  # required for Zephyr shell on UART1 (polling conflicts with shell backend; see UART driver docs) (w9wn from worker9)

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# WiFi backhaul for Heltec V3 ESP32-S3 gateway: NET_L2_WIFI_MGMT for ESP32 WiFi
# station (preferred; matches t_deck). IPv6 RA + NET_IF for BR prefix delegation
# and RPL root.
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"

# Standalone LoRa/CoAP gateway with WiFi station backhaul (Heltec V3 6LBR).
# Prefix delegation via net_mgmt + RPL integration per project-LICHEN-vsdl.
# Keep CONFIG_SLIP disabled so Zephyr does not require a zephyr,uart-pipe
# chosen node (SLIP selects UART_PIPE, which needs that chosen node).
CONFIG_SLIP=n

# No AES-CCM link key provisioned on bench gateway -> use CRC32 MIC fallback.
# INSECURE: for bench only; replace with proper key in production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y

# Bench-only dev link provisioning for T-Echo and T1000-E pucks (per LICHEN_L2_DEV_PROVISIONING).
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Dedicated TC TX thread avoids workqueue deadlock with lora_send() on boot.
CONFIG_NET_TC_TX_COUNT=1

# Stack sizes tuned for ESP32-S3 (Ed25519 verify, SCHC, CoAP, signing).
# Prevents overflows seen in previous workers (bd r002).
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288
CONFIG_MAIN_STACK_SIZE=8192

# Bench tuning: short RX window, low TX power to avoid saturation, RX1 delay.
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000
CONFIG_LICHEN_LORA_TX_POWER=2
CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100

# Persist link TX epoch across reboots (bd 3uhb) using NVS.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# ESP WiFi buffer tuning.
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8

# Additional network buffers and heap for gateway.
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_HEAP_MEM_POOL_SIZE=98304

# Battery support for real hardware test (N30).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# Resolved multi-way merge conflicts:
# - project-LICHEN-9ppq: Battery (w5), RPL_ROOT+stacks (w12), WiFi/prefix/heap (w14)
# - project-LICHEN-4tro (worker21): Removed all duplicate CONFIG lines, standardized
#   on NET_L2_WIFI_MGMT (removed conflicting NET_L2_ETHERNET), consolidated stacks,
#   added MAIN_STACK_SIZE, cleaned comments and ordering for canonical config.
# - project-LICHEN-rae4 (worker23): Updated worktree-worker23 gateway board config
#   to canonical version (removed NET_L2_ETHERNET, added UART_INTERRUPT_DRIVEN,
#   detailed comments, stack tuning, resolved comment block).
