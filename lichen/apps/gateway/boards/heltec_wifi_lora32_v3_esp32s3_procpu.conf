# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262
# CONFIG_UART_INTERRUPT_DRIVEN=y required for Zephyr shell on UART1
# (polling conflicts with shell backend; see UART driver docs) (w9wn)

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# WiFi backhaul for Heltec V3 ESP32-S3 gateway: NET_L2_ETHERNET + ESP32 WiFi
# driver binding (verified per 17rm,cam0). IPv6 RA + NET_IF for BR prefix
# delegation and RPL root (e4kq, tnok for M7 PoE+WiFi parity). Includes
# NET_L2_WIFI_MGMT (worker14 contribution).
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"

# Standalone LoRa/CoAP gateway with WiFi station backhaul (Heltec V3 6LBR).
# Prefix delegation via net_mgmt + RPL integration per project-LICHEN-vsdl.
# Keep CONFIG_SLIP disabled so Zephyr does not require a zephyr,uart-pipe
# chosen node (SLIP selects UART_PIPE, which needs that chosen node).
CONFIG_SLIP=n

# No AES-CCM link key is provisioned on this bench gateway. Without a MIC
# method lichen_link_tx() returns -EINVAL. Enable the CRC32 MIC fallback.
# INSECURE for bench only — replace with CONFIG_LICHEN_LINK_KEY for production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y

# SECURITY: bench-only dev link provisioning — per-node keys derived from a
# publicly-known seed + static peers (see LICHEN_L2_DEV_PROVISIONING help).
# Peers are the bench pucks (T-Echo + T1000-E EUIs).
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Run net TX on a dedicated traffic-class thread to avoid self-deadlock on
# the system workqueue with lora_send() (bd r002).
CONFIG_NET_TC_TX_COUNT=1

# RX-path stacks: LoRa L2 RX (Monocypher Ed25519 verify + SCHC) and net RX
# thread. Defaults overflow/crash on first real frame (bd r002). Tuned values
# incorporate stack tuning from worker12/24.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288

# Short RX window; boundary-straddling frames safe because sx12xx driver
# holds window open on preamble/header (local Zephyr patch).
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000

# BENCH: 2 dBm prevents saturation on antenna-to-antenna tests while
# allowing >150 B Block2 transfers.
CONFIG_LICHEN_LORA_TX_POWER=2

# Persist the link TX epoch across reboots (bd 3uhb) using storage_partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100

# Resolved canonical merge (project-LICHEN-9ppq / worker24 / worker14):
# - Battery support (worker5)
# - RPL_ROOT + buffer/stack tuning (worker12/24)
# - WiFi backhaul, prefix delegation, NET_L2_WIFI_MGMT, heap/buffers/NBR
#   tuning (worker14 + related)
# Consolidated; no duplicate CONFIG_ lines, no conflict markers. Supports
# concurrent CoAP/RPL/WiFi + battery on Heltec V3 without overflows.
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_HEAP_MEM_POOL_SIZE=98304
