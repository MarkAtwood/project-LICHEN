#
# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262. WiFi backhaul, RPL root,
# tuned stacks, NVS epoch persist, bench provisioning. Update SSID/PSK for production.
# CONFIG_UART_INTERRUPT_DRIVEN=y required for Zephyr shell on UART1
# (polling conflicts with shell backend; see UART driver docs).
#
# WiFi backhaul: NET_L2_ETHERNET + ESP32 WiFi driver. IPv6 RA + NET_IF for
# BR prefix delegation and RPL root. Includes NET_L2_WIFI_MGMT.
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"

CONFIG_SLIP=n

# No AES-CCM link key provisioned on bench gateway -> use CRC32 MIC fallback.
# INSECURE: for bench only; replace with proper key in production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y

# Bench-only dev link provisioning for T-Echo and T1000-E pucks (per LICHEN_L2_DEV_PROVISIONING).
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Dedicated TC TX thread avoids workqueue deadlock with lora_send() on boot.
CONFIG_NET_TC_TX_COUNT=1

# RX-path stacks: the LoRa L2 RX thread runs Monocypher Ed25519 verify +
# SCHC decompress (multi-KB stack), and the net RX thread carries the
# decompressed packet through IPv6/UDP/socket delivery. The 2048/1500
# defaults overflow and crash on the first real received frame. TC TX
# thread runs lichen_l2_send -> Ed25519 SIGNING; 1200 B default
# silently overflows on Xtensa and tramples context — crash appears later
# in xtensa_restore_high_regs. Larger values required for
# ESP32-S3 + WiFi coexistence. Short RX window; boundary-straddling frames safe because
# sx12xx driver holds window open on preamble/header (local Zephyr patch).
# BENCH: 2 dBm prevents saturation on antenna-to-antenna tests while
# allowing >150 B Block2 transfers.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288

CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000
CONFIG_LICHEN_LORA_TX_POWER=2

# Persist the link TX epoch across reboots: advance it +1 each
# boot so the gateway's counter stays ahead of peers' replay windows,
# eliminating the ~50% reboot replay coin-flip. Settings-on-NVS backed by
# the board's storage_partition@250000.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100

CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8
CONFIG_NET_MAX_ROUTERS=4
CONFIG_NET_IPV6_NBR_CACHE=16
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_HEAP_MEM_POOL_SIZE=98304

# Battery support for Heltec V3 (N30 1100mAh) real hardware test.
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y
