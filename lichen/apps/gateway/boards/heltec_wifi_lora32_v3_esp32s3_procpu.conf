# Resolved merge conflict for project-LICHEN-1ehc (worktree-worker23:
# heltec_wifi_lora32_v3_esp32s3_procpu.conf): removed conflict markers,
# consolidated settings from multiple worker branches. Includes:
# - Battery support (worker5)
# - RPL root, stacks, buffers (worker12/24)
# - WiFi backhaul/prefix/NET_L2_WIFI_MGMT/ESP buffers/heap (worker1/14/18/19/23)
# - L2 dev provisioning, epoch persist, RX tuning, TX power=2 (bench)
# - No duplicate keys; logical grouping; matches puck/ t_deck resolved pattern
# and worker23 clean state. Full networking + L2 + CoAP path.
