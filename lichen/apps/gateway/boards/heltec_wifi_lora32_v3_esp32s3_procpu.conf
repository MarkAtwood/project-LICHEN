# Heltec WiFi LoRa 32 V3 gateway config — ESP32-S3 + SX1262
# CONFIG_UART_INTERRUPT_DRIVEN=y required for Zephyr shell on UART1
# (polling conflicts with shell backend; see UART driver docs) (w9wn)

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_WIFI_NM=y
CONFIG_ESP_WIFI_ENABLED=y

# WiFi backhaul for Heltec V3 ESP32-S3 gateway: NET_L2_ETHERNET + ESP32 WiFi
# driver binding (verified per 17rm,cam0). IPv6 RA + NET_IF for BR prefix
# delegation and RPL root (e4kq, tnok for M7 PoE+WiFi parity).
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IF_MAX_IPV6_COUNT=3
CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_CONFIG_NEED_IPV6_ROUTER=y
CONFIG_LICHEN_GATEWAY_PREFIX_DELEGATION=y
CONFIG_LICHEN_GATEWAY_WIFI_SSID="lichen-test"
CONFIG_LICHEN_GATEWAY_WIFI_PSK="lichen123"

# Standalone LoRa/CoAP gateway with WiFi station backhaul (Heltec V3 6LBR).
# Prefix delegation via net_mgmt + RPL integration per project-LICHEN-vsdl.
# Keep CONFIG_SLIP disabled so Zephyr does not require a zephyr,uart-pipe
# chosen node (SLIP selects UART_PIPE, which needs that chosen node).
CONFIG_SLIP=n

# No AES-CCM link key is provisioned on this bench gateway. Without a MIC
# method lichen_link_tx() returns -EINVAL on every frame ("TX frame build
# failed: invalid argument (-22)"). Enable the CRC32 MIC fallback so the L2
# stack can transmit. INSECURE: CRC32 is error-detection only, not
# authentication — replace with CONFIG_LICHEN_LINK_KEY for production.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y

# SECURITY: bench-only dev link provisioning — per-node keys derived from a
# publicly-known seed + static peers (see LICHEN_L2_DEV_PROVISIONING help).
# Peers are the bench pucks, EUIs from SHA-256("LICHEN-EUI64-v1" || FICR
# DEVICEID bytes)[0:8] with U/L set, I/G cleared (lora_l2.c derivation):
#   7a7ff09dc86c2c10 = T-Echo  (DEVICEID 2BE0BCC87606D748)
#   8a1a2c4b93812cab = T1000-E (DEVICEID 891FA3226B7B0D14)
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
# Both bench pucks: T-Echo and T1000-E. The T1000-E's LR1110 RX is confirmed
# working (bd qpc0 — CalibImage fix), so the gateway answers its GETs to let
# it complete a full CoAP round trip. Three active nodes push the SF10 ALOHA
# budget, so expect some contention loss.
CONFIG_LICHEN_L2_DEV_PEER_EUI64="7a7ff09dc86c2c10,8a1a2c4b93812cab"

# Run net TX on a dedicated traffic-class thread. With TC_TX_COUNT=0, TX runs
# in the caller's context — boot-time ND/MLD sends run on the system workqueue,
# where lora_send() blocks waiting for the SX126x TX-done… which the driver
# delivers via a work item on that same workqueue. The self-deadlock times out
# after 2x airtime ("Packet transmission failed!", TX failed -11).
CONFIG_NET_TC_TX_COUNT=1

# RX-path stacks: the LoRa L2 RX thread runs Monocypher Ed25519 verify +
# SCHC decompress (multi-KB stack), and the net RX thread carries the
# decompressed packet through IPv6/UDP/socket delivery. The 2048/1500
# defaults overflow and crash on the first real received frame (bd r002).
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=4096

# Short RX window; boundary-straddling frames are safe because the sx12xx
# driver holds the window open on preamble/header detection instead of
# aborting mid-reception (local zephyr patch, see patches/README.md).
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000

# BENCH: nodes sit antenna-to-antenna (RX at ~-1 dBm). 14 dBm saturates the
# peer's receiver — short frames squeak through, but >150 B frames (Block2
# /status responses) were lost ~60-100% until power dropped; at 2 dBm the
# same transfers run 100%. Restore 14 dBm (the default) for field range.
CONFIG_LICHEN_LORA_TX_POWER=2
# The TC TX thread runs lichen_l2_send -> Ed25519 SIGNING for every
# outbound frame (CoAP responses included). 1200 B default silently
# overflows on Xtensa and tramples the neighbor's saved context — crash
# appears later in xtensa_restore_high_regs (bd r002).
CONFIG_NET_TX_STACK_SIZE=8192

# Persist the link TX epoch across reboots (bd 3uhb): advance it +1 each
# boot so the gateway's counter stays ahead of peers' replay windows,
# eliminating the ~50% reboot replay coin-flip. Settings-on-NVS backed by
# the board's storage_partition@250000.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

CONFIG_LICHEN_GATEWAY_RX1_DELAY_MS=100

# WiFi buffer tuning for Heltec V3 ESP32-S3 gateway (NET_L2_ETHERNET +
# prefix delegation + RPL root). These ESP-specific values balance RAM
# usage vs. throughput under LICHEN load (see gateway/Kconfig:227 comment
# on heap/stack/ESP buffer tuning, and similar in t_deck_esp32s3_procpu.conf).
# Chosen in integration/worker5 branch.
CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=8
CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM=8

# Stack size overrides (larger than the 8192/4096/8192 earlier in this file
# and in t_deck_esp32s3_procpu.conf or gateway/prj.conf). Required for
# WiFi mgmt events, RPL root (LORA_LICHEN_GATEWAY_RPL_ROOT), SCHC/crypto
# on RX, and Ed25519 signing + TC_TX on this Xtensa platform (avoids bd
# r002-style overflows). From worker5 integration.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=12288
CONFIG_NET_RX_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=12288

# Battery support for Heltec V3 real hardware (N30 1100mAh, same voltage
# divider on GPIO1/ADC1_CH0 + GPIO37 enable as in puck/boards/
# heltec_wifi_lora32_v3_esp32s3_procpu.conf, r1_neo_nrf52840.conf gateway,
# and board DTS vbatt alias). T1000_e_nrf52840.conf and t_deck use
# different power (GNSS/PMIC); here =y for /status CBOR battery fields.
# CONFIG_LICHEN_HAS_BATTERY selects the lichen power provider.
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# Note: CONFIG_LORA_LICHEN_GATEWAY_RPL_ROOT=y (and WIFI_* , NET_L2_ETHERNET,
# LICHEN_GATEWAY_PREFIX_DELEGATION=y, NET_IF_MAX_IPV6_COUNT=3) already
# present earlier; omitted here to avoid duplicates as per analysis of
# all heltec v3, esp32s3, t_deck, t1000, r1_neo, and puck configs.
