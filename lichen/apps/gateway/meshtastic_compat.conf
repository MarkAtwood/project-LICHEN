# Meshtastic app-compat BLE protocol shim dependency. Dispatcher Beads wire
# this into gateway BLE service paths; keep it as an app feature fragment so
# protocol compatibility does not masquerade as a board hardware capability.
CONFIG_LICHEN_MESHTASTIC_CODEC=y
CONFIG_LORA_LICHEN_BLE=n
CONFIG_LORA_LICHEN_MESHTASTIC_BLE=y
CONFIG_BT_ATT_PREPARE_COUNT=4
