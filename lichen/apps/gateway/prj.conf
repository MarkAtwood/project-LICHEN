# LICHEN gateway — border router / SLIP bridge Kconfig
# Acts as DODAG root (RPL) and SLIP bridge to upstream host

# LoRa radio (driver selected per board in boards/*.conf)
# ponytail: LORA_SX12XX only for external SPI chips (RAK4631, etc)
# STM32WL uses integrated radio via SUBGHZSPI
CONFIG_SPI=y
CONFIG_LORA=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_DHCPV6=y

# Application protocols
CONFIG_COAP=y
CONFIG_COAP_SERVER=y
CONFIG_COAP_SERVER_WELL_KNOWN_CORE=y
CONFIG_COAP_SERVER_MESSAGE_SIZE=896
CONFIG_ZCBOR=y

# LICHEN protocol stack
CONFIG_LICHEN=y
CONFIG_LICHEN_APP_INTERFACE=y
CONFIG_LICHEN_LINK=y
CONFIG_LICHEN_ROUTING=y
CONFIG_LICHEN_RPL=y
CONFIG_LICHEN_OSCORE=y

# LICHEN CoAP resources
CONFIG_LICHEN_COAP=y
CONFIG_LICHEN_COAP_CONFIG=y

# LICHEN L2 integration (LoRa -> IPv6 stack)
CONFIG_LICHEN_IPV6=y
CONFIG_LICHEN_LORA_L2=y
CONFIG_LICHEN_L2=y

# SLIP bridge
# Base enables NET_DRIVERS; board configs select TAP (sim) or UART (hardware)
CONFIG_NET_DRIVERS=y
CONFIG_SLIP=y

# Larger stacks — gateway handles RPL root duties + forwarding
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
