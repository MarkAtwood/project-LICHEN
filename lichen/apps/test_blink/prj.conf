# Absolute minimum — no drivers, no USB, no console
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_LOG=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_GPIO=y
CONFIG_USE_DT_CODE_PARTITION=y

# Safety (spec appendix-c-safety); assert fires via hard fault when no console
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
