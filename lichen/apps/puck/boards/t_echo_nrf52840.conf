# T-Echo puck config — nRF52840 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_HAS_DISPLAY=y

# USB CDC-ACM console — T-Echo has no USB-UART bridge chip.
# SERIAL must be explicitly enabled: USB_CDC_ACM selects UART_INTERRUPT_DRIVEN
# which depends on SERIAL, but nRF52840 doesn't pull it in without a physical UART.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# USB CDC-ACM via new USBD stack — old stack fails on T-Echo+MCUboot.
# Mirrors the T1000-E config which uses the same stack and works.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y

# LICHEN Native now depends on ZCBOR (upstream refactor moved CBOR
# encode/parse to zcbor). Without this, LICHEN_NATIVE silently drops to n,
# native.c isn't compiled, and USB never enumerates — the board looks dead.
CONFIG_ZCBOR=y
CONFIG_LICHEN_NATIVE=y
# Upstream HAL gates the native UART (and with it the 1200-bps DFU touch)
# behind this capability; without it lichen_hal_serial_device_get() returns
# -ENOTSUP and native init dies silently.
CONFIG_LICHEN_HAS_SERIAL_LOCAL=y
CONFIG_LICHEN_HAS_DISPLAY=y
CONFIG_REBOOT=y
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n

# MCUboot layout: boot_partition@0x26000, slot0@0x32000 (356 KB).
# FLASH_LOAD_OFFSET must match slot0 so the app is linked at the correct address.
# Without this, build-t_echo.sh strips the vector table and the image crashes.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_FLASH_LOAD_OFFSET=0x32000
CONFIG_FLASH_LOAD_SIZE=0x59000

# 5 s beacon for bench testing (default is 60 s)
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# L2/CoAP mode: the LICHEN net interface owns the radio; main.c's raw
# beacon loop is compiled out under CONFIG_LICHEN_L2 (they'd fight over the
# half-duplex radio). prj.conf provides NETWORKING/NET_IPV6/UDP/SOCKETS/COAP;
# LICHEN_LORA_L2 and LICHEN_L2 then default on. First-packet milestone:
# periodic CoAP GET /status to the gateway.
CONFIG_LICHEN_COAP=y
# lichen_coap_request() k_malloc()s per-request state.
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Dedicated preemptive net TX thread (same fix as the gateway): with
# TC_TX=0, system-workqueue-originated sends (ND/MLD) self-deadlock in
# lora_send() waiting for the SX126x TX-done work item queued on that same
# workqueue — "LoRa TX failed (-11)" — and hold the modem hostage exactly
# when responses arrive. The USB deaths once blamed on TC_TX=1 were really
# Ed25519 stack overflows (fixed in prj.conf). DAD/MLD stay ENABLED:
# without DAD the link-local never leaves tentative and packets go out
# with src :: (bd r002).
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_TC_THREAD_PREEMPTIVE=y

# SECURITY: bench-only publicly-known fixed Schnorr key.
# See LICHEN_L2_DEV_PROVISIONING help.
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
# The bench Heltec gateway (from its boot log: fe80::ec45:2f74:419c:f281,
# U/L bit flipped back). A node's own EUI-64/link-local is logged at L2 init.
# Gateway (CoAP destination) first, then the sibling T1000-E puck. Two
# pinned peers on a 64 MHz nRF52840 used to zero out RX because the RX loop
# Schnorr-verified every frame against ALL peers with the radio un-armed;
# the dev-mode early-exit (bd shbh) stops at the first match, so a gateway
# response verifies in one pass. Gateway is first so its frames exit
# immediately.
CONFIG_LICHEN_L2_DEV_PEER_EUI64="ee452f74419cf281,8a1a2c4b93812cab"

# SMP image management over USB CDC-ACM (cdc_acm_uart2, if04) — mirrors the
# T1000-E. Routine reflash path: smp-flash.py uploads a signed image to slot1
# over the RUNNING firmware; MCUboot swaps on reboot. No DFU mode, no buttons.
# MCUMGR depends on NET_BUF + ZCBOR; transport depends on BASE64 + CRC.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NET_BUF=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_UART_MTU=512
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
# Quiet the USB stack: usbd_ch9/udc_nrf log every control transfer at INF,
# so each host port-open floods the CDC console (which rides the same USB
# stack) with dozens of log lines. The burst coincides with watchdog resets
# at port-open; drop to WRN so opens are quiet.
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# Erase slot1 page-by-page as the upload advances. Without this, img_mgmt
# erases the whole slot (~364 KB) on the first chunk; nRF52 NVMC erase halts
# the CPU, the 4 s hardware watchdog can't be fed, and the SoC resets
# mid-upload (console dies mid-line, USB re-enumerates).
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# Persist the link TX epoch across reboots (bd 3uhb): advance it +1 each
# boot so a rebooted node's counter stays ahead of peers' replay windows,
# eliminating the ~50% reboot replay coin-flip. Settings-on-NVS backed by
# the board's storage_partition (FLASH/FLASH_MAP already enabled above).
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_LICHEN_LINK_EPOCH_PERSIST=y

# Serve the node's position at GET /sensors/location as SenML+CBOR
# (spec 12-apps.md §18.2.2). Returns 4.04 until a valid fix is available.
CONFIG_LICHEN_SENML=y
CONFIG_LICHEN_COAP_LOCATION=y

# E-ink display (GDEW0154M10 / SSD1681) for T-Echo
# Enables lichen_hal_display_* and display subsystem. Follows t_deck pattern.
# (project-LICHEN-2h1i.1.2.1.1)
CONFIG_DISPLAY=y
CONFIG_SSD16XX=y
CONFIG_LICHEN_HAS_DISPLAY=y
