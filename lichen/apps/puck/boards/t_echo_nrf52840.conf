# T-Echo puck config — nRF52840 + SX1262

CONFIG_LORA_SX126X=y

# USB CDC-ACM console — T-Echo has no USB-UART bridge chip.
# SERIAL must be explicitly enabled: USB_CDC_ACM selects UART_INTERRUPT_DRIVEN
# which depends on SERIAL, but nRF52840 doesn't pull it in without a physical UART.
CONFIG_SERIAL=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n

# USB device identity — distinguishes T-Echo from T1000-E in /dev/serial/by-id/
# T1000-E appears as "LICHEN_Node"; T-Echo appears as "LICHEN_T-Echo".
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN Project"
CONFIG_USB_DEVICE_PRODUCT="LICHEN T-Echo"

# Flash load offset: S140 v6.1.1 ends at 0x25FFF; app starts at 0x26000.
# No MCUboot on T-Echo — Adafruit UF2 bootloader handles OTA directly.
CONFIG_FLASH_LOAD_OFFSET=0x26000

# 5 s beacon for bench testing (default is 60 s)
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# T-Echo drives LoRa directly — no network stack needed.
# prj.conf enables these for T1000-E; disable here to avoid net thread panic.
CONFIG_NETWORKING=n
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=n
CONFIG_NET_SOCKETS=n
CONFIG_COAP=n
