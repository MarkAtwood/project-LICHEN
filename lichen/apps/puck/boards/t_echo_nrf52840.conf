# T-Echo puck config — nRF52840 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# USB CDC-ACM console — T-Echo has no USB-UART bridge chip.
# SERIAL must be explicitly enabled: USB_CDC_ACM selects UART_INTERRUPT_DRIVEN
# which depends on SERIAL, but nRF52840 doesn't pull it in without a physical UART.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# USB CDC-ACM via new USBD stack — old stack fails on T-Echo+MCUboot.
# Mirrors the T1000-E config which uses the same stack and works.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_CDC_ACM=n
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y

# LICHEN Native now depends on ZCBOR (upstream refactor moved CBOR
# encode/parse to zcbor). Without this, LICHEN_NATIVE silently drops to n,
# native.c isn't compiled, and USB never enumerates — the board looks dead.
CONFIG_ZCBOR=y
CONFIG_LICHEN_NATIVE=y
CONFIG_REBOOT=y
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n

# MCUboot layout: boot_partition@0x26000, slot0@0x32000 (356 KB).
# FLASH_LOAD_OFFSET must match slot0 so the app is linked at the correct address.
# Without this, build-t_echo.sh strips the vector table and the image crashes.
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_FLASH_LOAD_OFFSET=0x32000
CONFIG_FLASH_LOAD_SIZE=0x59000

# 5 s beacon for bench testing (default is 60 s)
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# T-Echo drives LoRa directly — no network stack needed.
# prj.conf enables these for T1000-E; disable here to avoid net thread panic.
CONFIG_NETWORKING=n
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=n
CONFIG_NET_SOCKETS=n
CONFIG_COAP=n

# The LICHEN L2 subsys compiles lichen_util.c unconditionally, and it includes
# tinycrypt/sha256.h. TINYCRYPT is normally pulled in by LICHEN_LORA_L2, but
# that depends on NETWORKING which the T-Echo disables (it drives LoRa directly
# with no IP stack). Enable tinycrypt explicitly so the shared util compiles.
CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y

# SMP image management over USB CDC-ACM (cdc_acm_uart2, if04) — mirrors the
# T1000-E. Routine reflash path: smp-flash.py uploads a signed image to slot1
# over the RUNNING firmware; MCUboot swaps on reboot. No DFU mode, no buttons.
# MCUMGR depends on NET_BUF + ZCBOR; transport depends on BASE64 + CRC.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NET_BUF=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_UART_MTU=512
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
# Quiet the USB stack: usbd_ch9/udc_nrf log every control transfer at INF,
# so each host port-open floods the CDC console (which rides the same USB
# stack) with dozens of log lines. The burst coincides with watchdog resets
# at port-open; drop to WRN so opens are quiet.
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# Erase slot1 page-by-page as the upload advances. Without this, img_mgmt
# erases the whole slot (~364 KB) on the first chunk; nRF52 NVMC erase halts
# the CPU, the 4 s hardware watchdog can't be fed, and the SoC resets
# mid-upload (console dies mid-line, USB re-enumerates).
CONFIG_IMG_ERASE_PROGRESSIVELY=y
