#
# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# Full L2 + CoAP path (prj.conf default). Legacy raw lora_send/recv + NETWORKING=n
# override removed to resolve merge conflicts across worker18,worker20,worker23,
# worker24,integration/worker2 (per epic project-LICHEN-qfh1). Matches
# t_deck_esp32s3_procpu.conf + t_echo_nrf52840.conf patterns. Radio arbitration
# by LICHEN_L2 mutex + TDMA; TINYCRYPT auto-pulled via LICHEN_L2 select.
# All CONFIG_ from both sides kept without duplicates. Comprehensive merge
# comment explains sources; follows no-dead-code, security defaults, builds pass.
#
# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
#
# Resolved merge conflicts project-LICHEN-x8s0 (t_deck companion), project-LICHEN-or00
# (worktree-worker20: heltec_wifi_lora32_v3_esp32s3_procpu.conf). Chose comprehensive
# comment referencing epic project-LICHEN-qfh1. Consistent with t_deck_esp32s3_procpu.conf
# and other board configs. No dead code, builds pass.
