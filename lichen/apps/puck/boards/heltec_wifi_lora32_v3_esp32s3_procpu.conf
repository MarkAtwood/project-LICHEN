# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# The puck drives LoRa directly (raw lora_send/lora_recv in main.c). Disable
# the network stack so LICHEN_LORA_L2 does not also spin up its RX thread —
# two readers on one half-duplex radio fight over the modem (mirrors the
# T-Echo puck config).
CONFIG_NETWORKING=n
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=n
CONFIG_NET_SOCKETS=n
CONFIG_COAP=n

# The LICHEN L2 subsys compiles lichen_util.c unconditionally and it includes
# tinycrypt/sha256.h; TINYCRYPT is normally selected via LICHEN_LORA_L2 which
# needs NETWORKING (disabled above). Enable explicitly (same as T-Echo).
CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y

# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y
