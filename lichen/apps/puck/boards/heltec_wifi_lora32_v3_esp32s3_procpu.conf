# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# Full L2 + CoAP path (prj.conf default). Legacy raw lora_send/recv + NETWORKING=n
# override removed to resolve merge conflicts across worker branches (worker18,
# worker20, worker23, worker24, integration/worker2 per epic project-LICHEN-qfh1).
# Matches t_deck_esp32s3_procpu.conf and t_echo_nrf52840.conf. Radio arbitration
# by LICHEN_L2 mutex + TDMA; TINYCRYPT auto-pulled via LICHEN_L2 select.
# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# Resolved merge conflict for project-LICHEN-7g14 (worktree-worker23:
# heltec_wifi_lora32_v3_esp32s3_procpu.conf): Removed all git conflict markers,
# consolidated comments from parallel worker merges referencing epic
# project-LICHEN-qfh1. No duplication, no dead code, follows conventions.
# Consistent with other resolved board configs.
