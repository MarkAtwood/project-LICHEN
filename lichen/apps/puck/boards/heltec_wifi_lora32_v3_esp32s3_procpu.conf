#
# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262
# L2/CoAP mode reaches AUTOSTART + observable /status resources.
# Resolves project-LICHEN-rc9t merge conflict from worktree-worker20
# heltec_wifi_lora32_v3_esp32s3_procpu.conf. Consolidated full L2/CoAP
# path (removes legacy NETWORKING=n raw lora_send/recv override from
# early worker5 puck; matches t_deck_esp32s3_procpu.conf and
# t_echo_nrf52840.conf behavior). Radio arbitration by LICHEN_L2 mutex + TDMA.
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_COAP=y
CONFIG_LICHEN_LORA_L2=y
CONFIG_LICHEN_L2=y
# lichen_coap_request() k_malloc()s per-request state.
CONFIG_HEAP_MEM_POOL_SIZE=4096
# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000
# Bench-only dev link provisioning (TOFU pinned peers for testing; matches
# other pucks). Gateway EUI first, then T1000-E.
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="ee452f74419cf281,8a1a2c4b93812cab"
CONFIG_LICHEN_COAP_LOCATION=y
CONFIG_LICHEN_SENML=y
# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y
