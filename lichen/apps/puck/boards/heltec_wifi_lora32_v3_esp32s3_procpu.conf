# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262
# Consolidated merge resolution across worker19 (project-LICHEN-sqrt), worker23 (7g14), worker18 (kd2n), worker24 (gdgn) and epic project-LICHEN-qfh1 / project-LICHEN-verh.
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_COAP=y
CONFIG_LICHEN_LORA_L2=y
CONFIG_LICHEN_L2=y
# lichen_coap_request() k_malloc()s per-request state.
CONFIG_HEAP_MEM_POOL_SIZE=4096
# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# Full L2 + CoAP path (prj.conf default). Legacy raw lora_send/recv + NETWORKING=n
# override removed to resolve merge conflicts across worker branches (worker18,
# worker20, worker23, worker24, integration/worker2 per epic project-LICHEN-qfh1,
# project-LICHEN-verh, project-LICHEN-gdgn).
# Matches t_deck_esp32s3_procpu.conf and t_echo_nrf52840.conf. Radio arbitration
# by LICHEN_L2 mutex + TDMA; TINYCRYPT auto-pulled via LICHEN_L2 select.
# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# Resolved merge conflict for project-LICHEN-6jxf (worktree-worker20), project-LICHEN-7g14 (worker23), project-LICHEN-sqrt/kd2n (worker19/18), project-LICHEN-gdgn (worker24): heltec_wifi_lora32_v3_esp32s3_procpu.conf.
# Consolidated comments from all parallel workers and epic project-LICHEN-qfh1/verh. Chose detailed L2/CoAP/HEAP settings, radio arbitration via LICHEN_L2 mutex + TDMA. Removed all markers, no duplication/dead code. Matches t_deck_esp32s3_procpu.conf, t_echo_nrf52840.conf patterns. Supports full protocol path + battery testing.
