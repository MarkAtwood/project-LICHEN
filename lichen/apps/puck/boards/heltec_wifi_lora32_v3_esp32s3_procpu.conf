# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# Full L2 + CoAP path (prj.conf default). Legacy raw lora_send/recv + NETWORKING=n
# override removed to resolve merge conflicts across worker branches (now
# matches t_deck_esp32s3_procpu.conf, t_echo_nrf52840.conf behavior).
# Radio arbitration handled by LICHEN_L2 mutex + TDMA. TINYCRYPT pulled
# automatically via LICHEN_L2 Kconfig select.

# Battery support for real hardware test (N30 1100mAh) — voltage-divider
# on GPIO1/ADC1_CH0 with GPIO37 control pin (see board DTS + Meshtastic).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# Resolved merge conflict for project-LICHEN-3lye (worktree-worker23
# heltec_wifi_lora32_v3_esp32s3_procpu.conf): removed conflict markers,
# adopted full-networking L2+CoAP path per current prj.conf and t_deck/t_echo
# pattern, retained battery support. Matches firmware-board-capability-matrix
# and avoids radio thread conflicts via L2 mutex.
