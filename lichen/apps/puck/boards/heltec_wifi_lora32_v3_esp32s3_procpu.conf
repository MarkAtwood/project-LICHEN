#
# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262 (full LICHEN_L2/CoAP mode)
# Matches t_deck_esp32s3_procpu.conf + t_echo/t1000_e pattern. prj.conf supplies
# NETWORKING=y/IPv6/UDP/SOCKETS/COAP/LICHEN_LORA_L2/LICHEN_L2 + stacks.
# Raw main.c beacon/RX loop is compiled out under CONFIG_LICHEN_L2 (LICHEN net_if
# owns the radio). Enables CoAP /status, SenML location, identity canary,
# bench interop with Heltec gateway. (Resolved project-LICHEN-lu12 / ln8x
# merge conflict in favor of full stack per prj.conf, Kconfig defaults, spec.)

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# Bench: 5 s beacons for quick RX demo + interop with other pucks/gateway
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# L2/CoAP (first-packet milestone)
CONFIG_LICHEN_COAP=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

# SECURITY: bench-only (public seed + CRC32 MIC). Gateway EUI from Heltec V3
# gateway logs.
CONFIG_LICHEN_LINK_INSECURE_CRC32_MIC=y
CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="ec452f74419cf281"

# Battery (N30 1100mAh voltage divider on GPIO1/ADC1_CH0 + GPIO37 enable per
# board DTS/Meshtastic layout)
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y

# ESP32-S3 tuning to prevent overflows, match other boards
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_TC_THREAD_PREEMPTIVE=y
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=8192
