# Heltec WiFi LoRa 32 V3 puck config — ESP32-S3 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks so all
# nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

# Full L2 + CoAP path (prj.conf default). TINYCRYPT pulled automatically via
# LICHEN_L2 Kconfig select. Legacy raw lora_send/recv + NETWORKING=n override
# removed to avoid merge conflicts across worker branches (matches
# t_deck_esp32s3_procpu.conf and t_echo_nrf52840.conf). Radio arbitration
# via LICHEN_L2 mutex + TDMA. Battery support for real hardware testing.
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y