# Muzi Works R1 Neo puck config - nRF52840 + SX1262

CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y

# LICHEN Native protocol over USB CDC-ACM.
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0029
CONFIG_USB_DEVICE_PRODUCT="LICHEN Puck"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"
CONFIG_ZCBOR=y
CONFIG_LICHEN_NATIVE=y
CONFIG_LICHEN_HAS_SERIAL_LOCAL=y

# Board capability boundary for app-facing hardware decisions.
CONFIG_LICHEN_BOARD_NAME="Muzi Works R1 Neo"
CONFIG_LICHEN_HAS_BUTTONS=y
CONFIG_LICHEN_HAS_LEDS=y
CONFIG_LICHEN_UI_PROFILE_TRACKER=y

# R1 Neo battery ADC is modeled in the board DTS as a voltage-divider sensor.
CONFIG_SENSOR=y
CONFIG_LICHEN_HAS_BATTERY=y

# Hardware present but intentionally disabled until validated or modeled.
CONFIG_LICHEN_HAS_DISPLAY=n
CONFIG_LICHEN_HAS_GNSS=n
CONFIG_LICHEN_HAS_PMIC=n
CONFIG_LICHEN_HAS_EXTERNAL_FLASH=n
