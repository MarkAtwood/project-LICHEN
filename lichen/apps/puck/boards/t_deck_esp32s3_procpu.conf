# Lilygo T-Deck puck config — ESP32-S3 + SX1262 + LVGL
# Consolidated merge resolution for project-LICHEN-lu8x (worktree-worker1), project-LICHEN-1hzd (worker18), project-LICHEN-p1s9 (worker19), project-LICHEN-6jxf/7g14/sqrt/kd2n/gdgn (workers 18-24) and epic project-LICHEN-qfh1/verh.
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_COAP=y
CONFIG_LICHEN_LORA_L2=y
CONFIG_LICHEN_L2=y
# lichen_coap_request() k_malloc()s per-request state.
CONFIG_HEAP_MEM_POOL_SIZE=4096
# 5 s beacon for bench testing (default 60 s) — matches the nRF pucks.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000
CONFIG_LVGL=y
CONFIG_LV_USE_KEYPAD=y
CONFIG_LV_FONT_MONTSERRAT_14=y
# Battery support for real hardware test (N30 1100mAh).
CONFIG_LICHEN_HAS_BATTERY=y
CONFIG_SENSOR=y
CONFIG_ADC=y
