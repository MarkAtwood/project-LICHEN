# RAK4631 board config — USB CDC-ACM + SLIP for border-router tethering

# USB device stack (nRF52840 native USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_VID=0x239A
CONFIG_USB_DEVICE_PID=0x0029
CONFIG_USB_DEVICE_PRODUCT="LICHEN Puck"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN"
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# SLIP over the CDC-ACM virtual serial port
CONFIG_NET_DRIVERS=y
CONFIG_SLIP=y
CONFIG_SLIP_STATISTICS=n

# Networking (already in prj.conf; repeated here to be explicit)
CONFIG_NET_IPV6=y

# Larger slip receive buffer (MTU 1280 for IPv6 minimum)
CONFIG_NET_BUF_DATA_SIZE=128

CONFIG_SPI=y
CONFIG_LORA_SX126X=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_SX126X=y
CONFIG_LICHEN_HAS_SERIAL_LOCAL=y

# L2/CoAP mode: with a LoRa radio present, LICHEN_LORA_L2/LICHEN_L2 default
# on and main.c compiles the CoAP client path, so LICHEN_COAP must be
# enabled (same as T-Echo). lichen_coap_request() k_malloc()s per-request.
CONFIG_LICHEN_COAP=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

# L2/CoAP dev provisioning to reach CoAP GET /status (fixes startup stall)
# Matches T-Echo/t1000e pattern for bench interoperability with Heltec gateway.

CONFIG_LICHEN_L2_DEV_PROVISIONING=y
CONFIG_LICHEN_L2_DEV_PEER_EUI64="ee452f74419cf281"
