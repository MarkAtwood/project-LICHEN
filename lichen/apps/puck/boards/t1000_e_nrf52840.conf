# Seeed T1000-E puck config — nRF52840 + LR1110

CONFIG_LORA_LR1110=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_GNSS=y
CONFIG_GNSS_AG3335=y

# LICHEN Native protocol over USB CDC-ACM
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="LICHEN Node"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
CONFIG_LICHEN_NATIVE=y
