# Seeed T1000-E puck config — nRF52840 + LR1110

CONFIG_LORA_LR1110=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_RADIO_MODEL_LR1110=y

# DEBUG: silence the very noisy USB stack logs so LR1110 diagnostic lines
# survive in the deferred log ring buffer and flush reliably.
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y

# 5 s beacon for bench testing (default 60 s) — matches the T-Echo so the
# two nodes exchange beacons quickly for the RX demo.
CONFIG_LICHEN_PUCK_BEACON_INTERVAL_MS=5000

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_GNSS=y
CONFIG_GNSS_AG3335=y
CONFIG_LICHEN_HAS_GNSS=y
CONFIG_LICHEN_LOCATION_PROVIDER_GNSS=y
CONFIG_LICHEN_TIME_PROVIDER_GNSS=y
CONFIG_PM_DEVICE=y

# OLD USB device stack (not NEXT). A/B testing proved the USB-CDC-NEXT stack
# causes watchdog reboots under sustained host monitoring (see the bring-up
# notes / bd issue); the old stack is reboot-free. buzz_n and the 1200-bps
# DFU-touch handler are stack-agnostic in native.c, so headless reflash works.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_USB_COMPOSITE_DEVICE=y
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
CONFIG_USB_DEVICE_PRODUCT="LICHEN Node"
CONFIG_USB_DEVICE_MANUFACTURER="LICHEN Project"
CONFIG_UART_LINE_CTRL=y
CONFIG_LICHEN_NATIVE=y
CONFIG_LICHEN_NATIVE_BUZZER=y
CONFIG_LICHEN_HAS_SERIAL_LOCAL=y

# MCUboot bootloader integration
CONFIG_BOOTLOADER_MCUBOOT=y

# SMP image management over USB CDC-ACM (cdc_acm_uart1, port separate from LICHEN Native)
# MCUMGR depends on NET_BUF + ZCBOR; transport depends on BASE64 + CRC; IMG on FLASH.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_UART_MTU=512
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
