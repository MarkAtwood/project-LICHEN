# Nucleo-WL55JC (STM32WL55) — built-in Sub-GHz radio, no USB peripheral.
# Memory targets: <50KB RAM, <220KB flash (sw3).

# STM32WL uses the built-in SubGHz radio driver (auto-selected from DTS).
# Explicitly enable it; the SX12xx external driver is not present on this board.
CONFIG_SPI=y
CONFIG_LORA_STM32WL_SUBGHZ_RADIO=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_COAP=y
CONFIG_IWDG_STM32_INITIAL_TIMEOUT=4000

# No USB hardware on STM32WL55 → no CDC-ACM, no USB stack.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n

# Reduce network buffer counts to fit in 64KB SRAM.
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_IPV6_MAX_NEIGHBORS=4
CONFIG_NET_MAX_CONTEXTS=4

# Reduce thread stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# Minimal logging (level 1 = errors only) to reduce RAM and flash
CONFIG_LOG_DEFAULT_LEVEL=1
