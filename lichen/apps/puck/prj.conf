# LICHEN puck — field device Kconfig
# Full mesh stack: LoRa radio, IPv6, UDP, CoAP

# LoRa radio (driver selected per-board: LORA_SX12XX or LORA_STM32WL_SUBGHZ_RADIO)
CONFIG_LORA=y

# Networking (disable 802.15.4 L2 — we drive the radio directly)
CONFIG_NET_L2_CUSTOM_IEEE802154=n
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# Application protocols
CONFIG_COAP=y

# LICHEN board capability HAL
CONFIG_LICHEN=y
CONFIG_LICHEN_HAL=y

# RNG (needed for nonces, OSCORE)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_CRC=y

# Stack sizes — LoRa + IPv6 + CoAP need generous stacks.
# Any thread that can originate an L2 TX runs SCHC compression + Monocypher
# Ed25519 signing (2-6 KB of stack) via lichen_link_tx: the zephyr coap_client
# thread (1 KB default — overflowed and wedged both nRF boards at the first
# CoAP send, bd r002) and the system workqueue (ND/DAD-originated sends).
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_COAP_CLIENT_STACK_SIZE=8192
CONFIG_NET_TX_STACK_SIZE=8192

# Block-wise transfers sized so each block response fits the L2 MTU; must
# match the 128-byte blocks the gateway serves for large resources.
CONFIG_COAP_CLIENT_BLOCK_SIZE=128

# CON retransmit timeout must exceed the real link RTT or the retransmit
# grabs the half-duplex modem exactly when the response is arriving and
# jams it. Worst case at SF10: ~1 s RX window + 0.8 s request airtime +
# ~1 s gateway window + 1.6 s max response airtime ≈ 4.4 s.
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=5000
# RX side of the same: Ed25519 verify + SCHC decompress run on the LoRa L2
# RX thread; IPv6/UDP delivery runs on the net RX thread.
CONFIG_LICHEN_LORA_L2_RX_STACK_SIZE=8192
CONFIG_NET_RX_STACK_SIZE=4096

# Short RX window for TX responsiveness (every TX waits out the in-flight
# window via the modem mutex). Frames that straddle the boundary are safe:
# the drivers hold the window open on preamble/header detection instead of
# aborting mid-reception.
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=1000

# MbedTLS disabled — OSCORE crypto is provided by the LICHEN crypto layer
CONFIG_MBEDTLS=n

# Safety (spec appendix-c-safety)
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Hardware watchdog — resilience against radio-driver lockups (see main.c).
CONFIG_WATCHDOG=y
