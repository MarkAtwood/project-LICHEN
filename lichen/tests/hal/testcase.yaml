tests:
  lichen.hal.native_defaults:
    tags:
      - lichen
      - hal
    platform_allow:
      - native_sim
      - qemu_x86
    integration_platforms:
      - native_sim
      - qemu_x86
  lichen.hal.loopback_lora:
    tags:
      - lichen
      - hal
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    extra_args:
      - CONF_FILE=prj.conf;prj_lora_loopback.conf
      - DTC_OVERLAY_FILE=boards/native_sim_lora_loopback.overlay
  lichen.hal.absent_power_qemu:
    tags:
      - lichen
      - hal
      - power
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86
    extra_configs:
      - CONFIG_LICHEN_HAS_BATTERY=n
      - CONFIG_LICHEN_HAS_PMIC=n
  lichen.hal.battery_adc:
    tags:
      - lichen
      - hal
      - power
      - battery
    platform_allow:
      - native_sim
      - qemu_x86
    integration_platforms:
      - native_sim
      - qemu_x86
    extra_args:
      - DTC_OVERLAY_FILE=boards/native_sim_battery_adc.overlay
    extra_configs:
      - CONFIG_ADC=y
      - CONFIG_ADC_EMUL=y
      - CONFIG_SENSOR=y
      - CONFIG_LICHEN_HAS_BATTERY=y
      - CONFIG_LICHEN_HAS_PMIC=n
  lichen.hal.power_providers:
    tags:
      - lichen
      - hal
      - power
      - battery
      - pmic
    platform_allow:
      - native_sim
      - qemu_x86
    integration_platforms:
      - native_sim
      - qemu_x86
    extra_args:
      - DTC_OVERLAY_FILE=boards/native_sim_power_providers.overlay
    extra_configs:
      - CONFIG_EMUL=y
      - CONFIG_I2C=y
      - CONFIG_FUEL_GAUGE=y
      - CONFIG_SBS_GAUGE_NEW_API=y
      - CONFIG_EMUL_SBS_GAUGE=y
      - CONFIG_CHARGER=y
      - CONFIG_SBS_CHARGER=y
      - CONFIG_EMUL_SBS_CHARGER=y
      - CONFIG_LICHEN_HAS_BATTERY=y
      - CONFIG_LICHEN_HAS_PMIC=y
