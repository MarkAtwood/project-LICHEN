# Test NVS persistence using the flash simulator.
#
# Within a single run, this test:
#   1. Writes values to NVS/settings
#   2. Unmounts and remounts NVS (simulating restart)
#   3. Verifies values persist
#
# For actual file persistence testing across binary restarts, run:
#   ./build/zephyr/zephyr.exe --flash=test_flash.bin
#   # First run writes values and exits
#   ./build/zephyr/zephyr.exe --flash=test_flash.bin
#   # Second run should read persisted values
#
# To erase flash at startup:
#   ./build/zephyr/zephyr.exe --flash=test_flash.bin --flash_erase
#
# To remove flash file on exit:
#   ./build/zephyr/zephyr.exe --flash=test_flash.bin --flash_rm

tests:
  fs.lichen.nvs_persistence:
    tags:
      - lichen
      - nvs
      - settings
      - persistence
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim
      - native_sim/native/64
