tests:
  lichen.hal_reset_unavailable.reboot_disabled:
    tags:
      - lichen
      - hal
      - reset
    harness: console
    harness_config:
      type: one_line
      regex:
        - "HAL reset unavailable PASS"
    platform_allow:
      - native_sim
      - native_sim/native/64
      - qemu_x86
    integration_platforms:
      - native_sim
      - native_sim/native/64
      - qemu_x86
