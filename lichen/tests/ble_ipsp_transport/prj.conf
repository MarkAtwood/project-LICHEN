CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=2048

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_DEVICE_NAME="LICHEN-BLE"

CONFIG_LICHEN=y
CONFIG_LICHEN_IPV6=n
CONFIG_LICHEN_LORA_L2=n
CONFIG_LICHEN_L2=n
CONFIG_LICHEN_BLE_TRANSPORT=y
CONFIG_LICHEN_BLE_SLIP=y
CONFIG_LICHEN_BLE_TRANSPORT_REQUIRE_SECURE=n

CONFIG_MAIN_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_LICHEN_BLE_TRANSPORT_LOG_LEVEL=4

# Break Kconfig dependency loop for native_posix BLE build (UART_INTERRUPT_DRIVEN <-> MCUMGR/CRC/ZCBOR/LICHEN_COAP_KEYS)
# per project-LICHEN-2auf.59.4.1.3.2.2.3
CONFIG_MCUMGR=n
CONFIG_UART_MCUMGR=n
CONFIG_LICHEN_COAP=n
CONFIG_LICHEN_COAP_KEYS=n
CONFIG_LICHEN_COAP_SERVER=n

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
