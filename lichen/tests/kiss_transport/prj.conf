CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=2048
CONFIG_PRINTK=y

CONFIG_SERIAL=y
CONFIG_RING_BUFFER=y

CONFIG_LICHEN=y
CONFIG_LICHEN_IPV6=n
CONFIG_LICHEN_LORA_L2=n
CONFIG_LICHEN_L2=n
CONFIG_LICHEN_KISS_TRANSPORT=y

CONFIG_MAIN_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_KISS_TRANSPORT_LOG_LEVEL=4

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
