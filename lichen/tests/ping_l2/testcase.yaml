tests:
  net.lichen.ping_l2_full_path:
    tags:
      - net
      - icmpv6
      - lichen
      - l2
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim
      - native_sim/native/64
    extra_configs:
      # False positive with CONFIG_STACK_CANARIES on native_sim: Zephyr seeds
      # __stack_chk_guard in z_cstart (on a Zephyr thread) after the host
      # runner's boot shim already stored the old guard, and this suite idles
      # mid-test, returning through nsif_cpu0_boot -> K_ERR_STACK_CHK_FAIL.
      # Canaries stay enabled for hardware builds via prj.conf.
      - CONFIG_STACK_CANARIES=n
