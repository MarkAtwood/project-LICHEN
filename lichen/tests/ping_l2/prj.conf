# ICMPv6 packet-path test over the real LICHEN L2 and LoRa loopback path

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y

# Zephyr test framework
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096

# Networking core
CONFIG_NETWORKING=y
CONFIG_NET_BUF=y
CONFIG_NET_LOG=y

# IPv6
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_POSIX_API=y

# Keep IPv6 minimal for the native loopback test
CONFIG_NET_IPV6_DAD=n

# Network buffers
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_IF_MAX_IPV6_COUNT=4

# Real LICHEN L2 path and native LoRa loopback radio
CONFIG_LICHEN=y
CONFIG_LICHEN_HAS_LORA=y
CONFIG_LICHEN_CRYPTO_MONOCYPHER=y
CONFIG_LICHEN_LINK=y
CONFIG_LICHEN_APP_IDENTITY=y
CONFIG_LICHEN_APP_IDENTITY_TEST_HOOKS=y
CONFIG_LICHEN_L2=y
CONFIG_LICHEN_L2_TEST_HOOKS=y
CONFIG_LORA=y
CONFIG_LORA_LOOPBACK=y
CONFIG_LORA_LOOPBACK_MTU=255
CONFIG_LORA_LOOPBACK_TEST_HOOKS=y
CONFIG_LICHEN_LORA_L2_RX_TIMEOUT_MS=100

# Random generator for test
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Stack sizes
CONFIG_IDLE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
