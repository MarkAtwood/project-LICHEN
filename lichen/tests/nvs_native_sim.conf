#
# Shared NVS configuration for native_sim testing.
# Include this fragment to enable NVS with settings on native_sim.
#
# Usage in testcase.yaml:
#   extra_args:
#     - CONF_FILE=prj.conf;../../nvs_native_sim.conf
#
# Runtime persistence (data persists across binary restarts):
#   ./zephyr.exe --flash=flash.bin
#
# Erase flash at startup:
#   ./zephyr.exe --flash=flash.bin --flash_erase
#
# The native_sim flash simulator uses a file-backed mmap by default.
# Without --flash, it defaults to "flash.bin" in the current directory.
# With --flash_in_ram, no file is used (data lost on exit).

# Flash and NVS subsystem
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_NVS=y

# Settings subsystem backed by NVS
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4

# Stack for settings operations
CONFIG_MAIN_STACK_SIZE=4096
