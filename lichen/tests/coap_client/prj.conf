CONFIG_ZTEST=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=1024

CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_SOCKETS=y

# native_sim has 15 preempt priorities, so Zephyr's default CoAP client
# priority 15 collides with idle priority and panics before this API test runs.
CONFIG_COAP_CLIENT_THREAD_PRIORITY=14

CONFIG_LICHEN=y
CONFIG_LICHEN_COAP=y

CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
