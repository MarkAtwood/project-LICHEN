CONFIG_ZTEST=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048

CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_SOCKETS=y
# SLIP transport registers a dummy L2 network device
CONFIG_NET_L2_DUMMY=y
CONFIG_SERIAL=y
CONFIG_RING_BUFFER=y

CONFIG_LICHEN=y
CONFIG_LICHEN_COAP=y
CONFIG_LICHEN_COAP_SERVER=y
# No client thread in this test (its default priority 15 panics on
# native_sim's 15-priority preempt range).
CONFIG_LICHEN_COAP_CLIENT=n
# The subject under test. Depends on LICHEN_SLIP_TRANSPORT (bd a2a2): it
# scopes admin access to the SLIP LCI interface, so that must be present
# for the module to compile and link.
CONFIG_LICHEN_SLIP_TRANSPORT=y
CONFIG_LICHEN_COAP_KEYS=y
CONFIG_LICHEN_COAP_KEYS_TEST_HOOKS=y

CONFIG_TINYCRYPT=y
CONFIG_TINYCRYPT_SHA256=y

# C Safety Policy - spec/appendix-c-safety.md
CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
