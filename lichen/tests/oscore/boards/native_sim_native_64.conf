# Board fragment for native_sim/native/64 (Zephyr merges
# boards/<board>_<qualifiers>.conf, not boards/native_sim.conf, for the
# qualified board name).

# Compiler stack canaries are incompatible with the native_sim 64-bit posix
# runner: z_cstart() re-randomizes __stack_chk_guard at boot, which trips
# __stack_chk_fail in runner/idle host frames the first time any Zephyr
# thread sleeps (k_msleep), e.g. the NVM retry backoff in
# oscore_ctx_persist_ssn() exercised by test_nvm_protect_request_failure.
# The failure is an instrumentation conflict in the posix arch idle path,
# not a real overflow (verified: suite passes on qemu_x86 with canaries on,
# and on native_sim/native/64 with canaries off).
CONFIG_STACK_CANARIES=n
