# Renode console config for nRF52840 LICHEN boards.
#
# Switch the console from the board-default RTT/USB CDC-ACM to UARTE0 so that
# boot and log output is observable during headless Renode validation.
# See renode_console.overlay for the matching devicetree changes.

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# Disable Segger RTT console (board default for T-Echo)
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# Renode has no USB host. The nRF USBD `enable` busy-waits forever on a
# VBUS/USBDETECTED event that never fires, spinning before the app reaches
# main() and starving the network TX thread. With the console already on
# UARTE0, the native USB CDC-ACM transport and its mcumgr consumer are dead
# weight in Renode, so disable them for Renode firmware builds.
CONFIG_LICHEN_NATIVE=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_MCUMGR_TRANSPORT_UART=n
CONFIG_MCUMGR=n
CONFIG_UART_MCUMGR=n

# nRF BLE HCI startup trace capture for T-Echo gateway characterization (5ix1.4.6)
# Identifies partial version response stall in HCI sequence vs Zephyr nRF CTLR expectations
CONFIG_BT_HCI_CORE_LOG_LEVEL_DBG=y
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y
