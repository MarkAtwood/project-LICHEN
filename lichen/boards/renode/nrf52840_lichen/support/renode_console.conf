# Renode console config for nRF52840 LICHEN boards.
#
# Switch the console from the board-default RTT/USB CDC-ACM to UARTE0 so that
# boot and log output is observable during headless Renode validation.
# See renode_console.overlay for the matching devicetree changes.

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# Disable Segger RTT console (board default for T-Echo)
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
