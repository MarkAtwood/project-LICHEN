# Renode console config for nRF52840 LICHEN boards.
#
# Switch the console from the board-default RTT/USB CDC-ACM to UARTE0 so that
# boot and log output is observable during headless Renode validation.
# See renode_console.overlay for the matching devicetree changes.

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# Disable Segger RTT console (board default for T-Echo)
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# nRF USBD model (NRF52840_USBD.cs) now simulates VBUS/READY/EVENTCAUSE/
# tasks/events/interrupts per 5ix1.4.5 trace. Full LICHEN_NATIVE + USBD stack
# reaches main:ready + CoAP without polling stall or firmware bypass. Console
# remains on UART0/UART1 (showAnalyzer); CDC is initialized but unused in sim.
CONFIG_LICHEN_NATIVE=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_UART_MCUMGR=y
