#
# Heltec UART1 non-resetting console config.
#
# Explicitly enable serial console on UART1 (GPIO21/22) to match
# the DTC_OVERLAY_FILE. Matches task requirements for chosen console/shell-uart
# and CONFIG_SERIAL=y. Use with external adapter + dtr=False/rts=False to
# prevent reset (verified).

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
